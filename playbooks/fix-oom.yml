---
- name: Remediation - Scale Up Memory
  hosts: localhost
  connection: local
  tasks:
    - name: Patch Deployment with more memory
      kubernetes.core.k8s:
        # Explicitly tell it to use the local pod credentials
        host: https://kubernetes.default.svc
        validate_certs: false
        state: patched
        kind: Deployment
        name: "{{ ansible_eda.event.payload.alerts[0].labels.app }}"
        namespace: "ms-demo"
        definition:
          spec:
            template:
              spec:
                containers:
                  - name: server
                    resources:
                      limits:
                        memory: "512Mi"
