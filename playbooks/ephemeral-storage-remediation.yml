---
- name: Ephemeral Storage Exhaustion Reactive Remediation
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    app_namespace: ms-demo

  tasks:

    - name: Log remediation start
      debug:
        msg: "Ephemeral storage eviction detected in {{ app_namespace }} — scanning for evicted pods"

    - name: Get all pods in namespace
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: all_pods

    - name: Build list of evicted pods
      set_fact:
        evicted_pods: >-
          {{ all_pods.resources
             | selectattr('status.reason', 'defined')
             | selectattr('status.reason', '==', 'Evicted')
             | map(attribute='metadata.name')
             | list }}

    - name: Log evicted pods found
      debug:
        msg: "Evicted pods found: {{ evicted_pods }}"

    - name: Fail gracefully if no evicted pods found
      fail:
        msg: "No evicted pods found in {{ app_namespace }}. Nothing to remediate."
      when: evicted_pods | length == 0

    - name: Delete each evicted pod so Kubernetes recreates it clean
      kubernetes.core.k8s:
        validate_certs: false
        state: absent
        kind: Pod
        name: "{{ item }}"
        namespace: "{{ app_namespace }}"
      loop: "{{ evicted_pods }}"

    - name: Log remediation complete
      debug:
        msg: "Deleted evicted pods: {{ evicted_pods }} — Kubernetes will recreate them clean"
