---
- name: CPU Throttling Remediation
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    app_namespace: ms-demo

  tasks:

    - name: Log remediation start
      debug:
        msg: "CPU throttling alert fired in {{ app_namespace }}"

    - name: Extract pod and container from event
      set_fact:
        throttled_pod: "{{ event.payload.alerts[0].labels.pod }}"
        throttled_container: "{{ event.payload.alerts[0].labels.container }}"

    - name: Log extracted values
      debug:
        msg: "Throttling detected on pod={{ throttled_pod }} container={{ throttled_container }}"

    - name: Get pod info
      kubernetes.core.k8s_info:
        kind: Pod
        name: "{{ throttled_pod }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: pod_info

    - name: Extract ReplicaSet name
      set_fact:
        replicaset_name: >-
          {{ pod_info.resources[0].metadata.ownerReferences
             | selectattr('kind', '==', 'ReplicaSet')
             | map(attribute='name') | first }}

    - name: Get ReplicaSet info
      kubernetes.core.k8s_info:
        kind: ReplicaSet
        name: "{{ replicaset_name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: rs_info

    - name: Extract Deployment name
      set_fact:
        deployment_name: >-
          {{ rs_info.resources[0].metadata.ownerReferences
             | selectattr('kind', '==', 'Deployment')
             | map(attribute='name') | first }}

    - name: Get Deployment info
      kubernetes.core.k8s_info:
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: deployment_info

    - name: Extract current CPU limit
      set_fact:
        current_cpu_limit_raw: >-
          {{ deployment_info.resources[0].spec.template.spec.containers
             | selectattr('name', '==', throttled_container)
             | map(attribute='resources.limits.cpu')
             | first }}

    - name: Convert CPU limit to millicores integer
      set_fact:
        current_cpu_millicores: >-
          {{ current_cpu_limit_raw | regex_replace('m', '') | int }}

    - name: Calculate new CPU limit (current x 1.5)
      set_fact:
        new_cpu_limit: "{{ (current_cpu_millicores | int * 1.5) | int }}m"

    - name: Log deployment and CPU values
      debug:
        msg: "Deployment={{ deployment_name }} current={{ current_cpu_limit_raw }} new={{ new_cpu_limit }}"

    - name: Increase CPU limit by 1.5x on throttled deployment
      kubernetes.core.k8s:
        validate_certs: false
        state: patched
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        definition:
          metadata:
            annotations:
              remediation/cpu-limit-increased-at: "{{ ansible_date_time.iso8601 }}"
          spec:
            template:
              spec:
                containers:
                  - name: "{{ throttled_container }}"
                    resources:
                      limits:
                        cpu: "{{ new_cpu_limit }}"

    - name: Log remediation complete
      debug:
        msg: "CPU limit increased from {{ current_cpu_limit_raw }} to {{ new_cpu_limit }} on {{ deployment_name }}/{{ throttled_container }}"
