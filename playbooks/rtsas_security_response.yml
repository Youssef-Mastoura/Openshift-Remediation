---
# =============================================================================
# rtsas_security_response.yml
# RTSAS — Runtime Threat Surveillance & Autonomous Security Response
# RF-02 — Autonomous Remediation Platform — LinSoft / ESPRIT 2025-2026
# =============================================================================
#
# Extra vars received from PREFAS engine (_run_security_approval):
#   threat_score  : integer 0-100
#   threat_tier   : ISOLATE / FORENSICS / ELIMINATE
#   falco_rule    : the Falco rule name that fired
#   target_pod    : the compromised pod name
#   namespace     : ms-demo
#   smtp_user     : Gmail address
#   smtp_password : Gmail app password
#
# TIER MAPPING:
#   Score 25-49  -> ISOLATE   : Phases 0-2 + 8-10
#   Score 50-79  -> FORENSICS : Phases 0-5 + 8-10
#   Score 80-100 -> ELIMINATE : Phases 0-10 (all phases)
#
# =============================================================================

- name: RTSAS Autonomous Security Response
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    forensics_dir: "/tmp/forensics-{{ target_pod }}-{{ ansible_date_time.epoch }}"
    service_name: "{{ target_pod | regex_replace('-[a-z0-9]+-[a-z0-9]+$', '') }}"
    loki_url: "http://loki.loki-stack.svc.cluster.local:3100"
    loki_namespace: "ms-demo"

  tasks:

# =============================================================================
# PHASE 0 - RESPONSE HEADER LOG (ALL TIERS)
# =============================================================================
# Purpose: Print a clear banner as the very first AAP job output line.
#          The operator sees pod, rule, score, tier, and timestamp immediately
#          without scrolling through any task output.
# =============================================================================

    - name: "[HEADER] RTSAS response parameters"
      ansible.builtin.debug:
        msg: >-
          ============================================================
          RTSAS AUTONOMOUS SECURITY RESPONSE - RF-02 PREFAS
          ============================================================
          Pod:          {{ target_pod }}
          Service:      {{ service_name }}
          Namespace:    {{ namespace }}
          Falco Rule:   {{ falco_rule }}
          Threat Score: {{ threat_score }}/100
          Tier:         {{ threat_tier }}
          Started at:   {{ ansible_date_time.iso8601 }}
          ============================================================

# =============================================================================
# PHASE 1 - PRE-RESPONSE TRIAGE (ALL TIERS)
# =============================================================================
# Purpose: Verify the threat target is real before taking any action.
#
# Problem it solves:
#   Without triage, RTSAS would blindly apply a NetworkPolicy even if the pod
#   was already recycled naturally 30 minutes before the operator clicked
#   Approve. That would isolate a healthy new pod for no reason.
#
# What it does:
#   - Fetches the current pod list for the affected service from K8s API
#   - Checks whether the exact target_pod name still exists in the cluster
#   - ABORTS the entire playbook if the pod is gone (stale/false incident)
#   - Records the pod restart count for inclusion in the forensic report
#   - Logs TRIAGE PASSED to confirm we proceed on a real, live target
#
# Outcome:
#   Pod exists     -> continue to Phase 2
#   Pod not found  -> fail with clear message, no NetworkPolicy applied
# =============================================================================

    - name: "[TRIAGE] Fetch current pod list for affected service"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ namespace }}"
        label_selectors:
          - "app={{ service_name }}"
        validate_certs: false
      register: triage_pods

    - name: "[TRIAGE] Check if target pod still exists"
      set_fact:
        pod_exists: >-
          {{ triage_pods.resources |
             selectattr('metadata.name', 'equalto', target_pod) |
             list | length > 0 }}

    - name: "[TRIAGE] Abort if pod no longer exists"
      ansible.builtin.fail:
        msg: >-
          RTSAS ABORT: Pod {{ target_pod }} no longer exists in {{ namespace }}.
          The incident is stale - the pod was already recycled before this
          response was approved. No action taken. Safe to dismiss this incident.
      when: not (pod_exists | bool)

    - name: "[TRIAGE] Extract pod restart count"
      set_fact:
        pod_restart_count: >-
          {{ (triage_pods.resources |
              selectattr('metadata.name', 'equalto', target_pod) |
              list | first).status.containerStatuses[0].restartCount | default(0) }}
      ignore_errors: true

    - name: "[TRIAGE] Triage passed - proceeding with response"
      ansible.builtin.debug:
        msg: >-
          TRIAGE PASSED: pod={{ target_pod }} confirmed running.
          Restart count at response time: {{ pod_restart_count | default('unknown') }}.
          Proceeding with {{ threat_tier }} response (score={{ threat_score }}/100).

# =============================================================================
# PHASE 2 - FULL BIDIRECTIONAL ISOLATION (ALL TIERS)
# =============================================================================
# Purpose: Immediately contain the compromised pod. Block ALL network traffic
#          in BOTH directions - nothing in, nothing out, except DNS.
#
# Why Ingress AND Egress (not just Egress like the original):
#   Blocking only Egress stops the pod calling out to a C2 server, but other
#   pods in the namespace can still SEND data TO the compromised pod. An
#   attacker with a foothold could receive commands via inbound connections.
#   Full bidirectional block is the correct containment posture.
#
# Why keep DNS (port 53 UDP+TCP):
#   Blocking DNS causes cascading failures across all namespace services that
#   share the cluster DNS resolver. DNS carries no sensitive payload and is
#   needed to keep the namespace stable during the investigation.
#
# Why keep openshift-monitoring inbound:
#   Prometheus must keep scraping so the operator can observe whether the
#   pod's resource usage or error rates change after isolation.
#
# What it does:
#   - Creates NetworkPolicy with policyTypes Ingress + Egress
#   - Labels with threat score, tier, rule (searchable: oc get netpol -l rtsas=true)
#   - Annotates with ISO8601 timestamp for audit trail
#   - Reads the policy back from K8s API to verify it was actually created
#   - Logs explicit confirmation of bidirectional isolation
# =============================================================================

    - name: "[ISOLATE] Apply full bidirectional NetworkPolicy"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: "rtsas-isolate-{{ service_name }}"
            namespace: "{{ namespace }}"
            labels:
              rtsas: "true"
              rtsas/tier: "{{ threat_tier }}"
              rtsas/score: "{{ threat_score | string }}"
            annotations:
              rtsas/isolated-at: "{{ ansible_date_time.iso8601 }}"
              rtsas/falco-rule: "{{ falco_rule }}"
              rtsas/threat-score: "{{ threat_score | string }}"
              rtsas/target-pod: "{{ target_pod }}"
          spec:
            podSelector:
              matchLabels:
                app: "{{ service_name }}"
            policyTypes:
              - Ingress
              - Egress
            ingress:
              - from:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: openshift-monitoring
            egress:
              - ports:
                  - port: 53
                    protocol: UDP
                  - port: 53
                    protocol: TCP

    - name: "[ISOLATE] Verify NetworkPolicy was created"
      kubernetes.core.k8s_info:
        api_version: networking.k8s.io/v1
        kind: NetworkPolicy
        name: "rtsas-isolate-{{ service_name }}"
        namespace: "{{ namespace }}"
        validate_certs: false
      register: netpol_verify

    - name: "[ISOLATE] Confirm isolation is active"
      ansible.builtin.debug:
        msg: >-
          ISOLATION {{ 'CONFIRMED' if netpol_verify.resources | length > 0 else 'WARNING - VERIFY MANUALLY' }}:
          NetworkPolicy rtsas-isolate-{{ service_name }} applied.
          Ingress: BLOCKED (except openshift-monitoring scraping)
          Egress:  BLOCKED (except DNS port 53 UDP+TCP)
          Pod {{ target_pod }} is now fully contained.

# =============================================================================
# PHASE 3 - DEEP KERNEL FORENSICS (SCORE >= 50)
# =============================================================================
# Purpose: Capture the compromised container's kernel-level runtime state
#          BEFORE any pod deletion. Once deleted, all in-memory evidence
#          is permanently gone.
#
# Six kernel data sources captured via /proc filesystem:
#
#   3a. /proc/1/status
#       Process identity, memory usage, Linux capabilities, seccomp state,
#       signal masks. Answers: "What is PID 1 and what privileges does it have?"
#
#   3b. /proc/1/task/1/children
#       PIDs of child processes spawned under PID 1. If an attacker opened
#       a shell, it appears here as a child PID.
#       Answers: "Did anything spawn under the main process?"
#
#   3c. /proc/1/environ
#       All environment variables of the running process. May contain
#       injected API keys, C2 server addresses, malware configuration,
#       or stolen credentials passed between processes.
#       Answers: "What secrets or configuration did the process have?"
#
#   3d. /proc/1/fd
#       All files the process currently has open. If an attacker wrote a
#       backdoor script to /tmp and deleted the file, the file descriptor
#       stays open and appears here - a real forensic technique.
#       Answers: "What files is the process reading or writing right now?"
#
#   3e. /proc/net/tcp
#       All active IPv4 TCP connections in hex format.
#       Answers: "What IPv4 network connections exist right now?"
#
#   3f. /proc/net/tcp6
#       All active IPv6 TCP connections.
#       Answers: "What IPv6 network connections exist right now?"
#
# All tasks use ignore_errors: true because distroless containers may not
# expose all /proc paths.
# =============================================================================

    - name: "[FORENSICS] Create forensics working directory"
      ansible.builtin.file:
        path: "{{ forensics_dir }}"
        state: directory
        mode: "0700"
      when: threat_score | int >= 50

    - name: "[FORENSICS] 3a - Capture PID 1 process status"
      kubernetes.core.k8s_exec:
        namespace: "{{ namespace }}"
        pod: "{{ target_pod }}"
        command: cat /proc/1/status
        validate_certs: false
      register: proc_status
      ignore_errors: true
      when: threat_score | int >= 50

    - name: "[FORENSICS] 3b - Capture child processes under PID 1"
      kubernetes.core.k8s_exec:
        namespace: "{{ namespace }}"
        pod: "{{ target_pod }}"
        command: cat /proc/1/task/1/children
        validate_certs: false
      register: child_procs
      ignore_errors: true
      when: threat_score | int >= 50

    - name: "[FORENSICS] 3c - Capture environment variables"
      kubernetes.core.k8s_exec:
        namespace: "{{ namespace }}"
        pod: "{{ target_pod }}"
        command: cat /proc/1/environ
        validate_certs: false
      register: env_vars
      ignore_errors: true
      when: threat_score | int >= 50

    - name: "[FORENSICS] 3d - Capture open file descriptors"
      kubernetes.core.k8s_exec:
        namespace: "{{ namespace }}"
        pod: "{{ target_pod }}"
        command: ls -la /proc/1/fd
        validate_certs: false
      register: open_fds
      ignore_errors: true
      when: threat_score | int >= 50

    - name: "[FORENSICS] 3e - Capture active TCP connections IPv4"
      kubernetes.core.k8s_exec:
        namespace: "{{ namespace }}"
        pod: "{{ target_pod }}"
        command: cat /proc/net/tcp
        validate_certs: false
      register: net_tcp
      ignore_errors: true
      when: threat_score | int >= 50

    - name: "[FORENSICS] 3f - Capture active TCP connections IPv6"
      kubernetes.core.k8s_exec:
        namespace: "{{ namespace }}"
        pod: "{{ target_pod }}"
        command: cat /proc/net/tcp6
        validate_certs: false
      register: net_tcp6
      ignore_errors: true
      when: threat_score | int >= 50

    - name: "[FORENSICS] 3g - Annotate pod with forensics location"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: v1
          kind: Pod
          metadata:
            name: "{{ target_pod }}"
            namespace: "{{ namespace }}"
            annotations:
              rtsas/forensics-captured-at: "{{ ansible_date_time.iso8601 }}"
              rtsas/forensics-path: "{{ forensics_dir }}/forensic_report.txt"
              rtsas/threat-score: "{{ threat_score | string }}"
              rtsas/falco-rule: "{{ falco_rule }}"
      ignore_errors: true
      when: threat_score | int >= 50

    - name: "[FORENSICS] 3h - Kernel forensics complete"
      ansible.builtin.debug:
        msg: >-
          KERNEL FORENSICS CAPTURED: PID1 status, child procs,
          env vars, open FDs, TCP IPv4+IPv6.
          Assembling full report after Loki log capture.
      when: threat_score | int >= 50

# =============================================================================
# PHASE 4 - LOKI APPLICATION LOG CAPTURE (SCORE >= 50)
# =============================================================================
# Purpose: Query Loki for application logs of the compromised pod covering
#          the 30 minutes before the Falco alert fired.
#
# Why this complements kernel forensics:
#   Phase 3 captures KERNEL STATE - what is happening at the syscall level
#   right now. That is the "snapshot at time of arrest."
#
#   Phase 4 captures BEHAVIORAL HISTORY - what the application was doing
#   for 30 minutes before Falco fired. That is the "timeline of events
#   leading to the crime."
#
#   Together:
#     Phase 3 answers: "What state is the process in and what connections does it have?"
#     Phase 4 answers: "What HTTP requests, errors, and events preceded the alert?"
#
# Loki query details:
#   URL:      http://loki.loki-stack.svc.cluster.local:3100  (proven by PREFAS Engine C)
#   Endpoint: /loki/api/v1/query_range
#   LogQL:    {namespace="ms-demo", pod="<target_pod>"}
#   Window:   now-30min to now (nanosecond epoch timestamps)
#   Limit:    200 lines, direction=backward (most recent first)
#   Auth:     none required (same as PREFAS engine_c_loki.py)
#
# Why ALL severity levels (not just errors):
#   A successful attack may not produce error logs. A SQL injection or
#   credential theft may appear as perfectly normal INFO-level logs.
#   We capture everything and let the operator identify suspicious patterns.
#
# What the operator should look for in the logs:
#   - Unusual HTTP endpoints (path traversal, /admin/*, /debug/*)
#   - Authentication failures in the minutes before the alert
#   - Unexpected external hostname resolution attempts
#   - Shell command output mixed into application logs (injection)
#   - Sudden log silence (attacker suppressed logging)
#   - Volume spike (automated exploitation)
# =============================================================================

    - name: "[LOKI] Query application logs for last 30 minutes"
      ansible.builtin.uri:
        url: "{{ loki_url }}/loki/api/v1/query_range?query=%7Bnamespace%3D%22{{ loki_namespace }}%22%2Cpod%3D%22{{ target_pod }}%22%7D&start={{ (ansible_date_time.epoch | int - 1800) }}000000000&end={{ ansible_date_time.epoch }}000000000&limit=200&direction=backward"
        method: GET
        validate_certs: false
        return_content: true
        timeout: 20
      register: loki_response
      ignore_errors: true
      when: threat_score | int >= 50

    - name: "[LOKI] Extract log lines from Loki response"
      set_fact:
        loki_log_lines: >-
          {{ loki_response.json.data.result
             | default([])
             | map(attribute='values')
             | flatten(levels=1)
             | map(attribute=1)
             | list
             | join('\n') }}
        loki_line_count: >-
          {{ loki_response.json.data.result
             | default([])
             | map(attribute='values')
             | flatten(levels=1)
             | list
             | length }}
      ignore_errors: true
      when:
        - threat_score | int >= 50
        - loki_response is defined
        - loki_response.status is defined
        - loki_response.status == 200

    - name: "[LOKI] Save application logs to forensics directory"
      ansible.builtin.copy:
        dest: "{{ forensics_dir }}/application_logs.txt"
        mode: "0600"
        content: |
          APPLICATION LOGS - 30 MINUTES BEFORE INCIDENT
          ===============================================
          Pod:        {{ target_pod }}
          Service:    {{ service_name }}
          Namespace:  {{ loki_namespace }}
          LogQL:      {namespace="{{ loki_namespace }}", pod="{{ target_pod }}"}
          Window:     Last 30 minutes before incident detection
          Lines:      {{ loki_line_count | default(0) }}
          Captured:   {{ ansible_date_time.iso8601 }}
          Source:     {{ loki_url }}
          -----------------------------------------------

          {{ loki_log_lines | default('No logs retrieved - Loki unavailable or pod had no output in this window') }}

          -----------------------------------------------
          WHAT TO LOOK FOR:
            - Unusual HTTP endpoints (path traversal, /admin/*, /debug/*)
            - Authentication failures before the alert
            - Unexpected external hostname resolution
            - Shell command output mixed into application logs
            - Sudden log silence (attacker suppressed logging)
            - Log volume spike (automated exploitation)
          ===============================================
      ignore_errors: true
      when: threat_score | int >= 50

    - name: "[LOKI] Log capture result"
      ansible.builtin.debug:
        msg: >-
          LOKI CAPTURE: {{ loki_line_count | default(0) }} lines from last 30min
          saved to {{ forensics_dir }}/application_logs.txt
          {{ '(WARNING: Loki returned no data)' if (loki_line_count | default(0) | int == 0) else '(OK)' }}
      when: threat_score | int >= 50

# =============================================================================
# PHASE 5 - IMAGE INTEGRITY / SUPPLY CHAIN CHECK (SCORE >= 50)
# =============================================================================
# Purpose: Capture the exact sha256 digest of the image running in the
#          compromised container to enable post-incident supply chain
#          verification.
#
# The problem this solves:
#   Container image TAGS are mutable. An attacker who compromises a container
#   registry can push a backdoored image under the same tag (:v1, :latest)
#   without changing the tag name. This is how supply chain attacks work -
#   SolarWinds, XZ Utils, and dozens of others exploited this exact vector.
#
#   The image DIGEST (sha256) is immutable. It is computed from the binary
#   content of the image layers. If one byte changes, the digest changes.
#   Kubernetes stores the actual pulled image digest in the pod's
#   containerStatuses[].imageID field.
#
# What this captures:
#   current_image_ref:    the tag  (e.g. gcr.io/.../emailservice:v0.10.0)
#   current_image_digest: the sha256 (e.g. sha256:abc123...)
#
# How to use it after the incident:
#   skopeo inspect docker://<image_ref> | python3 -m json.tool | grep -i digest
#   Registry digest == captured digest -> image authentic, attack was runtime
#   Registry digest != captured digest -> image was tampered with (supply chain)
#
# This technique is used in real container security incident response and
# is not typically implemented at student project level.
# =============================================================================

    - name: "[IMAGE-CHECK] Fetch pod image details from K8s API"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ namespace }}"
        label_selectors:
          - "app={{ service_name }}"
        validate_certs: false
      register: pod_image_info
      when: threat_score | int >= 50

    - name: "[IMAGE-CHECK] Extract image reference and sha256 digest"
      set_fact:
        current_image_ref: >-
          {{ (pod_image_info.resources |
              selectattr('metadata.name', 'equalto', target_pod) |
              list | first).status.containerStatuses[0].image | default('unknown') }}
        current_image_digest: >-
          {{ (pod_image_info.resources |
              selectattr('metadata.name', 'equalto', target_pod) |
              list | first).status.containerStatuses[0].imageID | default('unknown') }}
      ignore_errors: true
      when: threat_score | int >= 50

    - name: "[IMAGE-CHECK] Save image identity to forensics directory"
      ansible.builtin.copy:
        dest: "{{ forensics_dir }}/image_identity.txt"
        mode: "0600"
        content: |
          IMAGE INTEGRITY SNAPSHOT - SUPPLY CHAIN VERIFICATION
          ======================================================
          Pod:            {{ target_pod }}
          Image tag:      {{ current_image_ref | default('unknown') }}
          Image digest:   {{ current_image_digest | default('unknown') }}
          Captured at:    {{ ansible_date_time.iso8601 }}

          WHAT THE DIGEST MEANS
          ----------------------
          The sha256 digest is computed from the actual image content.
          Unlike a tag, it cannot be reassigned without changing the content.
          If the digest running here differs from the registry digest,
          the image was modified after deployment (supply chain attack).

          HOW TO VERIFY AGAINST THE REGISTRY
          ------------------------------------
          Run from bastion after the incident:

            skopeo inspect docker://{{ current_image_ref | default('IMAGE_REF') }} \
              | python3 -m json.tool | grep -i digest

          INTERPRETATION
          --------------
          Registry digest == {{ current_image_digest | default('(see above)') }}
            -> Image is AUTHENTIC. Attack came from runtime behavior.
               Safe to restart from this image after investigation.

          Registry digest != {{ current_image_digest | default('(see above)') }}
            -> Image was TAMPERED with after deployment.
               DO NOT restart from this image.
               Treat as supply chain compromise.
               Pull from a trusted source and verify provenance.
          ======================================================
      when: threat_score | int >= 50
      ignore_errors: true

    - name: "[IMAGE-CHECK] Assemble complete forensic report"
      ansible.builtin.copy:
        dest: "{{ forensics_dir }}/forensic_report.txt"
        mode: "0600"
        content: |
          ====================================================================
          RTSAS FORENSIC REPORT - RF-02 AUTONOMOUS SECURITY PLATFORM
          ====================================================================

          INCIDENT METADATA
          ------------------------------------------------------------------
          Pod:            {{ target_pod }}
          Service:        {{ service_name }}
          Namespace:      {{ namespace }}
          Falco Rule:     {{ falco_rule }}
          Threat Score:   {{ threat_score }}/100
          Response Tier:  {{ threat_tier }}
          Captured at:    {{ ansible_date_time.iso8601 }}
          Restart count:  {{ pod_restart_count | default('unknown') }}
          Investigator:   RTSAS Autonomous Security Response (RF-02)

          -- 3a. PROCESS STATUS (PID 1) --------------------------------------
          {{ proc_status.stdout | default('not available - distroless container') }}

          -- 3b. CHILD PROCESSES UNDER PID 1 ---------------------------------
          {{ child_procs.stdout | default('none detected') }}

          -- 3c. ENVIRONMENT VARIABLES (null bytes replaced with newlines) ---
          {{ env_vars.stdout | default('not available') | replace('\x00', '\n') }}

          -- 3d. OPEN FILE DESCRIPTORS ----------------------------------------
          {{ open_fds.stdout | default('not available') }}

          -- 3e. NETWORK CONNECTIONS - IPv4 TCP (hex encoded) ----------------
          Format: sl  local_addr:port  rem_addr:port  state
          Note: IPs are hex little-endian - reverse 2-byte groups to decode
          {{ net_tcp.stdout | default('not available') }}

          -- 3f. NETWORK CONNECTIONS - IPv6 TCP ------------------------------
          {{ net_tcp6.stdout | default('not available') }}

          -- 4. APPLICATION LOGS (Loki - last 30min) -------------------------
          Lines captured: {{ loki_line_count | default(0) }}
          Full log file:  {{ forensics_dir }}/application_logs.txt
          Source:         {{ loki_url }}

          -- 5. IMAGE INTEGRITY -----------------------------------------------
          Image tag:    {{ current_image_ref | default('unknown') }}
          Digest:       {{ current_image_digest | default('unknown') }}
          Full report:  {{ forensics_dir }}/image_identity.txt

          -- RESPONSE ACTIONS TAKEN ------------------------------------------
          [x] Triage:         pod existence verified before any action
          [x] Isolation:      NetworkPolicy applied - Ingress + Egress blocked
          [x] Kernel forensics: 6 data sources captured
          [x] Loki logs:      30-minute application history captured
          [x] Image digest:   sha256 captured for supply chain verification
          {{ '[x] Elimination: pod deleted - clean instance recreated' if threat_score | int >= 80 else '[ ] Elimination: not triggered (score below 80)' }}
          {{ '[x] Verification: new pod identified and annotated' if threat_score | int >= 80 else '' }}

          -- OPERATOR NEXT STEPS ---------------------------------------------
          1. Review env vars (3c) for injected secrets or C2 server addresses
          2. Review open FDs (3d) for attacker-written files (even if deleted)
          3. Review application_logs.txt for suspicious requests before alert
          4. Compare image digest against registry with skopeo (see image_identity.txt)
          5. After investigation remove isolation:
               oc delete networkpolicy rtsas-isolate-{{ service_name }} -n {{ namespace }}
          6. Verify service health:
               oc get pods -n {{ namespace }}
               oc get endpoints -n {{ namespace }} | grep {{ service_name }}

          -- END OF REPORT ---------------------------------------------------
      when: threat_score | int >= 50

    - name: "[IMAGE-CHECK] Log image digest and report location"
      ansible.builtin.debug:
        msg: >-
          IMAGE INTEGRITY CAPTURED:
          tag={{ current_image_ref | default('unknown') }}
          digest={{ current_image_digest | default('unknown') }}
          Full report: {{ forensics_dir }}/forensic_report.txt
      when: threat_score | int >= 50

# =============================================================================
# PHASE 6 - POD ELIMINATION (SCORE >= 80)
# =============================================================================
# Purpose: Delete the compromised pod. The Kubernetes Deployment controller
#          automatically recreates a fresh pod from the same spec.
#          This terminates any attacker session and gives the service a clean
#          runtime instance.
#
# Critical ordering guarantee:
#   Ansible executes tasks sequentially. Phases 3, 4, and 5 (all forensics)
#   complete before this phase runs. Evidence is always captured before
#   evidence is destroyed. This is enforced by task order, not conditionals.
#
# Why delete the pod and not the Deployment:
#   Deleting the Deployment loses the ReplicaSet history needed for PREFAS
#   rollback and causes a longer outage. Deleting just the pod lets the
#   Deployment controller handle clean recreation.
#
# Important: The NetworkPolicy from Phase 2 stays active after recreation.
#   The new pod has the same app label -> same selector -> still isolated.
#   Operator MUST manually remove it after completing the investigation.
# =============================================================================

    - name: "[ELIMINATE] Delete compromised pod"
      kubernetes.core.k8s:
        state: absent
        validate_certs: false
        api_version: v1
        kind: Pod
        namespace: "{{ namespace }}"
        name: "{{ target_pod }}"
      when: threat_score | int >= 80

    - name: "[ELIMINATE] Wait for clean pod recreation (max 120s)"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ namespace }}"
        label_selectors:
          - "app={{ service_name }}"
        validate_certs: false
      register: new_pod_status
      until: >-
        new_pod_status.resources |
        selectattr('status.phase', 'equalto', 'Running') |
        list | length > 0
      retries: 12
      delay: 10
      when: threat_score | int >= 80

    - name: "[ELIMINATE] Pod deletion confirmed"
      ansible.builtin.debug:
        msg: >-
          ELIMINATION COMPLETE:
          Compromised pod {{ target_pod }} deleted.
          Deployment controller is recreating a clean instance.
          NetworkPolicy isolation is still active on the new pod.
      when: threat_score | int >= 80

# =============================================================================
# PHASE 7 - POST-ELIMINATION VERIFICATION (SCORE >= 80)
# =============================================================================
# Purpose: Confirm the new pod is a genuinely different instance from the
#          deleted one and create a permanent audit trail on it.
#
# What it does:
#   - Identifies the new pod name (different name from deleted target_pod)
#   - Confirms new_pod_name != target_pod (proves a fresh instance exists)
#   - Annotates the NEW pod with: which compromised pod it replaced, when
#     it was created, original threat score, and isolation-active reminder
#   - Prints the exact oc delete command the operator needs to run
#
# Why annotate the new pod:
#   oc describe pod <new-pod> will show the full security context:
#   which compromised pod this replaced, the incident score, the falco rule,
#   and a reminder that isolation is active. This is the audit trail that
#   security reviewers and juries look for in incident documentation.
# =============================================================================

    - name: "[VERIFY] Pause 10s for new pod phase to stabilize"
      ansible.builtin.pause:
        seconds: 20
      when: threat_score | int >= 80

    - name: "[VERIFY] Fetch pod list after recreation"
      k8s_info: ...
      register: new_pods_verify
      until: >-                        ← added retry loop
        new_pods_verify.resources |
        rejectattr('metadata.name', 'equalto', target_pod) |
        selectattr('status.phase', 'equalto', 'Running') |
        list | length > 0
      retries: 6
      delay: 10
      when: threat_score | int >= 80

    - name: "[VERIFY] Identify the new clean pod"
      set_fact:
        new_pod_name: >-
          {{ (new_pods_verify.resources |
              rejectattr('metadata.name', 'equalto', target_pod) |
              selectattr('status.phase', 'equalto', 'Running') |
              list | first).metadata.name | default('unknown') }}
      when: threat_score | int >= 80
      ignore_errors: true

    - name: "[VERIFY] Confirm new pod is a fresh instance"
      ansible.builtin.debug:
        msg: >-
          POST-ELIMINATION VERIFICATION:
          --------------------------------------------------
          Deleted (compromised): {{ target_pod }}
          Recreated (clean):     {{ new_pod_name | default('pending') }}
          Result: {{ 'CLEAN INSTANCE CONFIRMED' if (new_pod_name | default('unknown')) not in [target_pod, 'unknown'] else 'WARNING - verify manually' }}
          --------------------------------------------------
      when: threat_score | int >= 80

    - name: "[VERIFY] Annotate new pod as post-incident clean instance"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: v1
          kind: Pod
          metadata:
            name: "{{ new_pod_name }}"
            namespace: "{{ namespace }}"
            annotations:
              rtsas/replaced-compromised-pod: "{{ target_pod }}"
              rtsas/clean-instance-since: "{{ ansible_date_time.iso8601 }}"
              rtsas/original-threat-score: "{{ threat_score | string }}"
              rtsas/original-falco-rule: "{{ falco_rule }}"
              rtsas/isolation-still-active: "true - remove rtsas-isolate-{{ service_name }} after investigation"
      when:
        - threat_score | int >= 80
        - new_pod_name is defined
        - new_pod_name | default('unknown') != 'unknown'
        - new_pod_name | default('unknown') != target_pod
      ignore_errors: true

    - name: "[VERIFY] Operator cleanup reminder"
      ansible.builtin.debug:
        msg: >-
          !! OPERATOR ACTION REQUIRED AFTER INVESTIGATION !!
          ------------------------------------------------------------------
          NetworkPolicy rtsas-isolate-{{ service_name }} is STILL ACTIVE.
          The new pod {{ new_pod_name | default(service_name + '-new') }}
          is ALSO isolated (same app={{ service_name }} label = same selector).

          Remove isolation after investigation:
            oc delete networkpolicy rtsas-isolate-{{ service_name }} -n {{ namespace }}

          Verify service health after removal:
            oc get pods -n {{ namespace }}
            oc get endpoints -n {{ namespace }} | grep {{ service_name }}
          ------------------------------------------------------------------
      when: threat_score | int >= 80

# =============================================================================
# PHASE 8 - EMAIL NOTIFICATION (ALL TIERS)
# =============================================================================
# Purpose: Send a structured security alert email with all incident details,
#          actions taken per tier, and operator next steps.
#
# Subject format: [RTSAS ELIMINATE] paymentservice-xxx - score 100/100
# This is immediately identifiable in the operator inbox without opening.
# smtp_user and smtp_password come from AAP extra_vars.
# ignore_errors: true ensures email failure never blocks the response.
# =============================================================================

    - name: "[NOTIFY] Write email notification script"
      ansible.builtin.copy:
        dest: "/tmp/rtsas_notify_{{ service_name }}.py"
        content: |
          import smtplib
          from email.mime.text import MIMEText

          score = {{ threat_score | int }}

          actions = "- Pre-response triage: pod existence verified\n"
          actions += "- NetworkPolicy isolation: Ingress + Egress blocked (DNS only)\n"
          if score >= 50:
              actions += "- Kernel forensics: PID status, child procs, env vars, open FDs, TCP IPv4+IPv6\n"
              actions += "- Application logs: 30-minute Loki history captured ({{ loki_line_count | default(0) }} lines)\n"
              actions += "- Image integrity: sha256 digest captured for supply chain verification\n"
          if score >= 80:
              actions += "- Pod DELETED: compromised instance removed\n"
              actions += "- Clean instance: {{ new_pod_name | default('recreated by Deployment controller') }}\n"
              actions += "- Post-elimination: new pod annotated with incident metadata\n"

          body = f"""RTSAS SECURITY INCIDENT RESPONSE
          =====================================
          Pod:          {{ target_pod }}
          Service:      {{ service_name }}
          Namespace:    {{ namespace }}
          Falco Rule:   {{ falco_rule }}
          Threat Score: {{ threat_score }}/100
          Tier:         {{ threat_tier }}
          Time:         {{ ansible_date_time.iso8601 }}

          ACTIONS TAKEN
          -------------
          {actions}
          FORENSICS
          ---------
          {'Directory: {{ forensics_dir }}' if score >= 50 else 'Not captured (score below 50)'}
          {'Files: forensic_report.txt, application_logs.txt, image_identity.txt' if score >= 50 else ''}

          OPERATOR NEXT STEPS
          -------------------
          1. Review forensic_report.txt for kernel-level evidence
          2. Review application_logs.txt for behavioral history (Loki)
          3. Compare image digest against registry with skopeo
          4. After investigation remove isolation:
               oc delete networkpolicy rtsas-isolate-{{ service_name }} -n {{ namespace }}

          --------------------------------------------------
          RF-02 RTSAS - LinSoft / ESPRIT 2025-2026
          Autonomous Security Response Platform
          """

          msg = MIMEText(body)
          msg['Subject'] = '[RTSAS {{ threat_tier }}] {{ target_pod }} - score {{ threat_score }}/100'
          msg['From'] = '{{ smtp_user }}'
          msg['To'] = '{{ smtp_user }}'
          s = smtplib.SMTP('smtp.gmail.com', 587, timeout=15)
          s.starttls()
          s.login('{{ smtp_user }}', '{{ smtp_password }}')
          s.send_message(msg)
          s.quit()
          print("Security notification email sent")
      no_log: true

    - name: "[NOTIFY] Send security alert email"
      ansible.builtin.command: "python3 /tmp/rtsas_notify_{{ service_name }}.py"
      ignore_errors: true

    - name: "[NOTIFY] Cleanup email script"
      ansible.builtin.file:
        path: "/tmp/rtsas_notify_{{ service_name }}.py"
        state: absent

# =============================================================================
# PHASE 9 - PREFAS FEEDBACK LOOP (ALL TIERS)
# =============================================================================
# Purpose: POST the incident outcome to the PREFAS engine so the security
#          incident card updates from APPROVED to RESOLVED in the dashboard
#          and the resolution_rate statistic increments correctly.
#
# Without this, security incident cards stay permanently amber in the UI.
# =============================================================================

    - name: "[FEEDBACK] Report outcome to PREFAS engine"
      ansible.builtin.uri:
        url: "http://prefas-engine.ms-demo.svc.cluster.local:8000/feedback"
        method: POST
        body_format: json
        body:
          incident_id: "{{ incident_id | default(0) | int }}"
          outcome: "resolved"
          note: >-
            RTSAS {{ threat_tier }} response complete.
            score={{ threat_score }}/100 rule={{ falco_rule }}
            isolation=applied
            forensics={{ 'captured' if threat_score | int >= 50 else 'skipped' }}
            loki_lines={{ loki_line_count | default(0) }}
            image_digest={{ 'captured' if threat_score | int >= 50 else 'skipped' }}
            pod_deleted={{ 'yes - ' + (new_pod_name | default('unknown')) if threat_score | int >= 80 else 'no' }}
        status_code: [200, 201, 204]
        validate_certs: false
      ignore_errors: true

# =============================================================================
# PHASE 10 - FINAL SUMMARY (ALL TIERS)
# =============================================================================
# Purpose: Print a clean checklist as the last line of AAP job output.
#          The operator sees exactly which phases ran and which were skipped
#          without reading the full job log.
# =============================================================================

    - name: "[SUMMARY] Final RTSAS response summary"
      ansible.builtin.debug:
        msg: >-
          ====================================================================
          RTSAS RESPONSE COMPLETE - RF-02 AUTONOMOUS SECURITY PLATFORM
          ====================================================================
          Pod:          {{ target_pod }}
          Service:      {{ service_name }}
          Falco Rule:   {{ falco_rule }}
          Threat Score: {{ threat_score }}/100
          Tier:         {{ threat_tier }}
          --------------------------------------------------------------------
          [x] Phase 1  - Triage:        pod existence verified
          [x] Phase 2  - Isolation:     NetworkPolicy (Ingress + Egress blocked)
          {{ '[x]' if threat_score | int >= 50 else '[ ]' }} Phase 3  - Kernel forensics: 6 sources (proc, env, FDs, TCP)
          {{ '[x]' if threat_score | int >= 50 else '[ ]' }} Phase 4  - Loki logs:        {{ loki_line_count | default(0) }} lines from last 30min
          {{ '[x]' if threat_score | int >= 50 else '[ ]' }} Phase 5  - Image digest:     sha256 for supply chain check
          {{ '[x]' if threat_score | int >= 80 else '[ ]' }} Phase 6  - Elimination:      compromised pod deleted
          {{ '[x]' if threat_score | int >= 80 else '[ ]' }} Phase 7  - Verification:     clean instance confirmed + annotated
          [x] Phase 8  - Email:         operator notification sent
          [x] Phase 9  - Feedback:      PREFAS dashboard updated
          --------------------------------------------------------------------
          ISOLATION STILL ACTIVE - remove after investigation:
          oc delete networkpolicy rtsas-isolate-{{ service_name }} -n {{ namespace }}
          ====================================================================
