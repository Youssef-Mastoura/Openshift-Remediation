---
- name: S7 - Pending Pod Remediation (3 causes)
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    app_namespace: ms-demo

  tasks:

    - name: Extract alert info from event
      set_fact:
        alert_pod: "{{ event.payload.alerts[0].labels.pod }}"
        remediation_type: "{{ event.payload.alerts[0].labels.remediation }}"

    - name: Log remediation start
      debug:
        msg: "Pending pod alert fired — pod={{ alert_pod }} cause={{ remediation_type }}"

    - name: Get pod info
      kubernetes.core.k8s_info:
        kind: Pod
        name: "{{ alert_pod }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: pod_info

    - name: Extract ReplicaSet name from pod
      set_fact:
        replicaset_name: >-
          {{ pod_info.resources[0].metadata.ownerReferences
             | selectattr('kind', '==', 'ReplicaSet')
             | map(attribute='name') | first }}

    - name: Get ReplicaSet info
      kubernetes.core.k8s_info:
        kind: ReplicaSet
        name: "{{ replicaset_name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: rs_info

    - name: Extract Deployment name from ReplicaSet
      set_fact:
        deployment_name: >-
          {{ rs_info.resources[0].metadata.ownerReferences
             | selectattr('kind', '==', 'Deployment')
             | map(attribute='name') | first }}

    - name: Get Deployment info
      kubernetes.core.k8s_info:
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: deployment_info

    - name: Log deployment name
      debug:
        msg: "Deployment={{ deployment_name }} cause={{ remediation_type }}"

    # ─────────────────────────────────────────────
    # CAUSE 1 — Insufficient Resources
    # ─────────────────────────────────────────────

    - name: "[Resources] Extract container name"
      set_fact:
        container_name: >-
          {{ deployment_info.resources[0].spec.template.spec.containers[0].name }}
      when: remediation_type == "pending-pod-resources"

    - name: "[Resources] Extract current CPU and memory requests"
      set_fact:
        current_cpu_request: >-
          {{ deployment_info.resources[0].spec.template.spec.containers[0]
             .resources.requests.cpu | default('100m') }}
        current_mem_request: >-
          {{ deployment_info.resources[0].spec.template.spec.containers[0]
             .resources.requests.memory | default('128Mi') }}
      when: remediation_type == "pending-pod-resources"

    - name: "[Resources] Convert CPU request to millicores integer"
      set_fact:
        cpu_millicores: "{{ current_cpu_request | regex_replace('m', '') | int }}"
      when: remediation_type == "pending-pod-resources"

    - name: "[Resources] Convert memory request to Mi integer"
      set_fact:
        mem_mi: "{{ current_mem_request | regex_replace('Mi', '') | int }}"
      when: remediation_type == "pending-pod-resources"

    - name: "[Resources] Compute reduced requests (×0.75)"
      set_fact:
        new_cpu_request: "{{ (cpu_millicores | int * 0.75) | int }}m"
        new_mem_request: "{{ (mem_mi | int * 0.75) | int }}Mi"
      when: remediation_type == "pending-pod-resources"

    - name: "[Resources] Log current and new resource requests"
      debug:
        msg: >
          CPU: {{ current_cpu_request }} → {{ new_cpu_request }}
          | Memory: {{ current_mem_request }} → {{ new_mem_request }}
      when: remediation_type == "pending-pod-resources"

    - name: "[Resources] Patch deployment with reduced resource requests"
      kubernetes.core.k8s:
        validate_certs: false
        state: patched
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        definition:
          metadata:
            annotations:
              remediation/resources-reduced-at: "{{ ansible_date_time.iso8601 }}"
          spec:
            template:
              spec:
                containers:
                  - name: "{{ container_name }}"
                    resources:
                      requests:
                        cpu: "{{ new_cpu_request }}"
                        memory: "{{ new_mem_request }}"
      when: remediation_type == "pending-pod-resources"

    # ─────────────────────────────────────────────
    # CAUSE 2 — Node Affinity Mismatch
    # ─────────────────────────────────────────────

    - name: "[Affinity] Log remediation start"
      debug:
        msg: "Removing nodeSelector and affinity constraints from {{ deployment_name }}"
      when: remediation_type == "pending-pod-affinity"

    - name: "[Affinity] Remove nodeSelector from deployment"
      kubernetes.core.k8s:
        validate_certs: false
        state: patched
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        definition:
          metadata:
            annotations:
              remediation/affinity-removed-at: "{{ ansible_date_time.iso8601 }}"
          spec:
            template:
              spec:
                nodeSelector: null
                affinity: null
      when: remediation_type == "pending-pod-affinity"

    # ─────────────────────────────────────────────
    # CAUSE 3 — PVC Not Bound
    # ─────────────────────────────────────────────

    - name: "[PVC] Find all PVCs in namespace"
      kubernetes.core.k8s_info:
        kind: PersistentVolumeClaim
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: all_pvcs
      when: remediation_type == "pending-pod-pvc"

    - name: "[PVC] Filter pending PVCs"
      set_fact:
        pending_pvcs: >-
          {{ all_pvcs.resources | selectattr('status.phase', '==', 'Pending') | list }}
      when: remediation_type == "pending-pod-pvc"

    - name: "[PVC] Log pending PVCs found"
      debug:
        msg: "Found {{ pending_pvcs | length }} pending PVC(s): {{ pending_pvcs | map(attribute='metadata.name') | list }}"
      when: remediation_type == "pending-pod-pvc"

    - name: "[PVC] Delete pending PVCs to force reprovisioning"
      kubernetes.core.k8s:
        validate_certs: false
        state: absent
        kind: PersistentVolumeClaim
        name: "{{ item.metadata.name }}"
        namespace: "{{ app_namespace }}"
      loop: "{{ pending_pvcs }}"
      when:
        - remediation_type == "pending-pod-pvc"
        - pending_pvcs | length > 0

    # ─────────────────────────────────────────────
    # FINAL — Report
    # ─────────────────────────────────────────────

    - name: Report remediation complete
      debug:
        msg: >
          S7 remediation complete for {{ deployment_name }}
          | cause: {{ remediation_type }}
          | namespace: {{ app_namespace }}
