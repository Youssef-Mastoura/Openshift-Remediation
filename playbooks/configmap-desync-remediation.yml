---
- name: ConfigMap Desync Dynamic Remediation
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    app_namespace: ms-demo

  tasks:

    - name: Log remediation start
      debug:
        msg: "ConfigMap desync alert fired in {{ app_namespace }} — scanning for affected deployments via ConfigMap labels"

    - name: Get all ConfigMaps with managed-by-deployment label
      kubernetes.core.k8s_info:
        kind: ConfigMap
        namespace: "{{ app_namespace }}"
        validate_certs: false
        label_selectors:
          - "managed-by-deployment"
      register: labeled_configmaps

    - name: Extract configmap and deployment pairs using Jinja2
      set_fact:
        configmap_deployment_pairs: >-
          {{ labeled_configmaps.resources | map(attribute='metadata') | list
             | map('combine', {}) | list }}

    - name: Build clean pairs list
      set_fact:
        clean_pairs: >-
          {{ clean_pairs | default([]) + [
            {
              'configmap': item.name,
              'deployment': item.labels['managed-by-deployment']
            }
          ] }}
      loop: "{{ configmap_deployment_pairs }}"

    - name: Log pairs found
      debug:
        msg: "Found ConfigMap-Deployment pairs: {{ clean_pairs }}"

    - name: Fail gracefully if no labeled ConfigMaps found
      fail:
        msg: "No ConfigMaps with label managed-by-deployment found in {{ app_namespace }}. Nothing to remediate."
      when: clean_pairs | length == 0

    - name: Restore annotation on each ConfigMap to mark remediation time
      kubernetes.core.k8s:
        validate_certs: false
        state: patched
        kind: ConfigMap
        name: "{{ item.configmap }}"
        namespace: "{{ app_namespace }}"
        definition:
          metadata:
            annotations:
              remediation/restored-at: "{{ ansible_date_time.iso8601 }}"
      loop: "{{ clean_pairs }}"

    - name: Trigger rolling restart on each affected deployment
      kubernetes.core.k8s:
        validate_certs: false
        state: patched
        kind: Deployment
        name: "{{ item.deployment }}"
        namespace: "{{ app_namespace }}"
        definition:
          spec:
            template:
              metadata:
                annotations:
                  kubectl.kubernetes.io/restartedAt: "{{ ansible_date_time.iso8601 }}"
      loop: "{{ clean_pairs }}"

    - name: Wait for each affected deployment to finish rolling restart
      kubernetes.core.k8s_info:
        kind: Deployment
        name: "{{ item.deployment }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: rollout_status
      until: >
        rollout_status.resources[0].status.readyReplicas is defined and
        rollout_status.resources[0].status.readyReplicas ==
        rollout_status.resources[0].spec.replicas
      retries: 15
      delay: 10
      loop: "{{ clean_pairs }}"

    - name: Log remediation complete
      debug:
        msg: "Remediation complete — rolling restart triggered for: {{ clean_pairs | map(attribute='deployment') | list }}"
