              event: "{{ event }}"

    - name: Trigger CrashLoopBackOff Bad Entrypoint Fix
      condition: event.payload.alerts is selectattr("labels.remediation", "==", "crashloop-bad-entrypoint")
      action:
        run_job_template:
          name: "crashloop-remediation"
          organization: "Default"
          job_args:
            extra_vars:
              event: "{{ event }}"

    - name: Trigger DoS Attack Fix
