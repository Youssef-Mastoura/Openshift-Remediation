---
- name: CPU Throttling Remediation
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    app_namespace: ms-demo
    new_cpu_limit: "300m"

  tasks:

    - name: Log remediation start
      debug:
        msg: "CPU throttling detected on pod {{ throttled_pod }} container {{ throttled_container }} — increasing CPU limit"

    - name: Get the deployment name from the pod
      kubernetes.core.k8s_info:
        kind: Pod
        name: "{{ throttled_pod }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: pod_info

    - name: Extract deployment name from pod owner references
      set_fact:
        replicaset_name: >-
          {{ pod_info.resources[0].metadata.ownerReferences
             | selectattr('kind', '==', 'ReplicaSet')
             | map(attribute='name')
             | first }}

    - name: Get ReplicaSet to find Deployment name
      kubernetes.core.k8s_info:
        kind: ReplicaSet
        name: "{{ replicaset_name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: rs_info

    - name: Extract deployment name
      set_fact:
        deployment_name: >-
          {{ rs_info.resources[0].metadata.ownerReferences
             | selectattr('kind', '==', 'Deployment')
             | map(attribute='name')
             | first }}

    - name: Log deployment found
      debug:
        msg: "Throttled container belongs to Deployment: {{ deployment_name }}"

    - name: Increase CPU limit on the throttled deployment only
      kubernetes.core.k8s:
        validate_certs: false
        state: patched
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        definition:
          metadata:
            annotations:
              remediation/cpu-limit-increased-at: "{{ ansible_date_time.iso8601 }}"
          spec:
            template:
              spec:
                containers:
                  - name: "{{ throttled_container }}"
                    resources:
                      limits:
                        cpu: "{{ new_cpu_limit }}"

    - name: Log remediation complete
      debug:
        msg: "CPU limit increased to {{ new_cpu_limit }} on deployment {{ deployment_name }} container {{ throttled_container }}"
