---
- name: OOMKilled Memory Remediation
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    app_namespace: "ms-demo"

  tasks:
    - name: Log remediation start
      debug:
        msg: "OOMKilled alert received — starting memory remediation"

    - name: Extract pod, container and remediation type from event
      set_fact:
        oom_pod: "{{ event.payload.alerts[0].labels.pod }}"
        oom_container: "{{ event.payload.alerts[0].labels.container }}"
        remediation_type: "{{ event.payload.alerts[0].labels.remediation }}"

    - name: Log extracted values
      debug:
        msg: "OOMKilled on pod={{ oom_pod }} container={{ oom_container }} type={{ remediation_type }}"

    - name: Derive deployment name from pod name
      set_fact:
        deployment_name: "{{ oom_pod | regex_replace('-[a-z0-9]+-[a-z0-9]+$', '') }}"

    - name: Log derived deployment name
      debug:
        msg: "Derived deployment name: {{ deployment_name }}"

    - name: Get Deployment info
      kubernetes.core.k8s_info:
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: deployment_info

    - name: Extract current memory limit from Deployment spec
      set_fact:
        current_mem_raw: >-
          {{ deployment_info.resources[0].spec.template.spec.containers
             | selectattr('name', '==', oom_container)
             | map(attribute='resources.limits.memory') | first }}

    - name: Convert memory limit to Mi integer
      set_fact:
        current_mem_mi: "{{ current_mem_raw | regex_replace('Mi', '') | int }}"

    - name: Calculate new memory limit (current x 1.5)
      set_fact:
        new_mem_limit: "{{ (current_mem_mi | int * 1.5) | int }}Mi"

    - name: Get current replica count
      set_fact:
        current_replicas: "{{ deployment_info.resources[0].spec.replicas | int }}"

    - name: Log deployment and memory values
      debug:
        msg: >-
          Deployment={{ deployment_name }} container={{ oom_container }}
          current_memory={{ current_mem_raw }} new_memory={{ new_mem_limit }}
          current_replicas={{ current_replicas }} remediation_type={{ remediation_type }}

    - name: Patch deployment — increase memory limit by 1.5x
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ deployment_name }}"
            namespace: "{{ app_namespace }}"
            annotations:
              remediation/oom-memory-increased-at: "{{ ansible_date_time.iso8601 }}"
              remediation/oom-previous-limit: "{{ current_mem_raw }}"
              remediation/oom-new-limit: "{{ new_mem_limit }}"
          spec:
            template:
              spec:
                containers:
                  - name: "{{ oom_container }}"
                    resources:
                      limits:
                        memory: "{{ new_mem_limit }}"
                      requests:
                        memory: "{{ (current_mem_mi | int * 0.75) | int }}Mi"

    - name: Scale up replicas by 1 (recurring OOM only)
      when: remediation_type == "increase-mem-recurring"
      kubernetes.core.k8s_scale:
        api_version: apps/v1
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        replicas: "{{ (current_replicas | int) + 1 }}"
        validate_certs: false

    - name: Annotate replica scale (recurring OOM only)
      when: remediation_type == "increase-mem-recurring"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ deployment_name }}"
            namespace: "{{ app_namespace }}"
            annotations:
              remediation/oom-replicas-scaled-at: "{{ ansible_date_time.iso8601 }}"
              remediation/oom-previous-replicas: "{{ current_replicas | string }}"
              remediation/oom-new-replicas: "{{ ((current_replicas | int) + 1) | string }}"

    - name: Wait for rollout to complete
      kubernetes.core.k8s_info:
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: rollout_status
      until: >-
        rollout_status.resources[0].status.readyReplicas is defined and
        rollout_status.resources[0].status.readyReplicas ==
        rollout_status.resources[0].spec.replicas
      retries: 12
      delay: 10

    - name: Remediation summary
      debug:
        msg: >-
          ✅ Remediation complete for {{ deployment_name }}.
          Strategy={{ remediation_type }}.
          Memory {{ current_mem_raw }} → {{ new_mem_limit }}.
          {% if remediation_type == 'increase-mem-recurring' %}
          Replicas {{ current_replicas }} → {{ (current_replicas | int) + 1 }}.
          {% endif %}
