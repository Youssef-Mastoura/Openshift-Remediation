---
- name: CPU Throttling Remediation
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    app_namespace: ms-demo
    throttling_threshold: "0.25"
    new_cpu_limit: "300m"

  tasks:

    - name: Log remediation start
      debug:
        msg: "CPU throttling alert fired in {{ app_namespace }} — identifying throttled containers"

    - name: Get all deployments in namespace
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: all_deployments

    - name: Build list of deployment names
      set_fact:
        deployment_names: >-
          {{ all_deployments.resources
             | map(attribute='metadata.name')
             | list }}

    - name: Log deployments found
      debug:
        msg: "Deployments in {{ app_namespace }}: {{ deployment_names }}"

    - name: Increase CPU limit on all deployments that have a CPU limit set
      kubernetes.core.k8s:
        validate_certs: false
        state: patched
        kind: Deployment
        name: "{{ item.metadata.name }}"
        namespace: "{{ app_namespace }}"
        definition:
          metadata:
            annotations:
              remediation/cpu-limit-increased-at: "{{ ansible_date_time.iso8601 }}"
          spec:
            template:
              spec:
                containers:
                  - name: "{{ item.spec.template.spec.containers[0].name }}"
                    resources:
                      limits:
                        cpu: "{{ new_cpu_limit }}"
      loop: "{{ all_deployments.resources }}"
      when: >
        item.spec.template.spec.containers[0].resources.limits is defined and
        item.spec.template.spec.containers[0].resources.limits.cpu is defined

    - name: Log remediation complete
      debug:
        msg: "CPU limits increased to {{ new_cpu_limit }} on all deployments with CPU limits in {{ app_namespace }}"
