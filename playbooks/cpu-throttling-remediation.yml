---
- name: CPU Throttling — Autonomous Remediation
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    app_namespace: ms-demo

  tasks:

    # ─────────────────────────────────────────
    # PHASE 1 — EVENT PARSING
    # ─────────────────────────────────────────

    - name: "[PHASE 1] Extract alert context from EDA event"
      set_fact:
        throttled_pod: "{{ event.payload.alerts[0].labels.pod }}"
        throttled_container: "{{ event.payload.alerts[0].labels.container }}"
        alert_namespace: "{{ event.payload.alerts[0].labels.namespace }}"

    - name: "[PHASE 1] Derive deployment name from pod name"
      set_fact:
        deployment_name: "{{ throttled_pod | regex_replace('-[a-z0-9]+-[a-z0-9]+$', '') }}"

    - name: "[PHASE 1] Log parsed alert context"
      debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "  RF-02 | CPU Throttling Remediation Initiated"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "  Pod         : {{ throttled_pod }}"
          - "  Container   : {{ throttled_container }}"
          - "  Deployment  : {{ deployment_name }}"
          - "  Namespace   : {{ alert_namespace }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    # ─────────────────────────────────────────
    # PHASE 2 — DISCOVERY
    # ─────────────────────────────────────────

    - name: "[PHASE 2] Fetch Deployment spec"
      kubernetes.core.k8s_info:
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: deployment_info

    - name: "[PHASE 2] Abort if deployment not found"
      fail:
        msg: "Deployment '{{ deployment_name }}' not found. Aborting."
      when: deployment_info.resources | length == 0

    - name: "[PHASE 2] Extract current CPU limit and replica count"
      set_fact:
        current_cpu_raw: >-
          {{ deployment_info.resources[0].spec.template.spec.containers
             | selectattr('name', '==', throttled_container)
             | map(attribute='resources.limits.cpu') | first }}
        current_replicas: "{{ deployment_info.resources[0].spec.replicas | int }}"

    - name: "[PHASE 2] Convert CPU limit to millicores integer"
      set_fact:
        current_cpu_millicores: "{{ current_cpu_raw | regex_replace('m', '') | int }}"

    - name: "[PHASE 2] Calculate new CPU limit (x1.5)"
      set_fact:
        new_cpu_limit: "{{ (current_cpu_millicores | int * 1.5) | int }}m"
        new_replicas: "{{ (current_replicas | int) + 1 }}"

    - name: "[PHASE 2] Log remediation plan"
      debug:
        msg:
          - "  CPU Limit : {{ current_cpu_raw }} → {{ new_cpu_limit }}"
          - "  Replicas  : {{ current_replicas }} → {{ new_replicas }}"
          - "  Strategy  : Vertical (CPU x1.5) + Horizontal (+1 replica)"

    # ─────────────────────────────────────────
    # PHASE 3 — REMEDIATION
    # ─────────────────────────────────────────

    - name: "[PHASE 3] Patch deployment — increase CPU limit by 1.5x"
      kubernetes.core.k8s:
        validate_certs: false
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ deployment_name }}"
            namespace: "{{ app_namespace }}"
            annotations:
              remediation/action: "cpu-throttling-relief"
              remediation/triggered-by: "RF-02-PREFAS"
              remediation/timestamp: "{{ ansible_date_time.iso8601 }}"
              remediation/previous-cpu-limit: "{{ current_cpu_raw }}"
              remediation/new-cpu-limit: "{{ new_cpu_limit }}"
          spec:
            template:
              spec:
                containers:
                  - name: "{{ throttled_container }}"
                    resources:
                      limits:
                        cpu: "{{ new_cpu_limit }}"

    # ─────────────────────────────────────────
    # PHASE 4 — VERIFICATION
    # ─────────────────────────────────────────

    - name: "[PHASE 4] Wait for deployment rollout to complete"
      kubernetes.core.k8s_info:
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: rollout_status
      until: >-
        rollout_status.resources[0].status.readyReplicas is defined and
        rollout_status.resources[0].status.readyReplicas ==
        rollout_status.resources[0].spec.replicas
      retries: 18
      delay: 10

    - name: "[PHASE 4] Verify rollout succeeded"
      fail:
        msg: "Rollout did not complete within timeout. Manual inspection required."
      when: >-
        rollout_status.resources[0].status.readyReplicas is not defined or
        rollout_status.resources[0].status.readyReplicas !=
        rollout_status.resources[0].spec.replicas

    - name: "[PHASE 4] Wait for rollout to fully settle before scaling"
      pause:
        seconds: 15

    - name: "[PHASE 4] Scale up replicas by 1 (horizontal scaling)"
      kubernetes.core.k8s_scale:
        api_version: apps/v1
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        replicas: "{{ new_replicas }}"
        validate_certs: false
        wait: true
        wait_timeout: 120

    - name: "[PHASE 4] Annotate scale event"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ deployment_name }}"
            namespace: "{{ app_namespace }}"
            annotations:
              remediation/replicas-scaled-at: "{{ ansible_date_time.iso8601 }}"
              remediation/previous-replicas: "{{ current_replicas | string }}"
              remediation/new-replicas: "{{ new_replicas | string }}"

    - name: "[PHASE 4] Wait for scale rollout to complete"
      kubernetes.core.k8s_info:
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: scale_status
      until: >-
        scale_status.resources[0].status.readyReplicas is defined and
        scale_status.resources[0].status.readyReplicas ==
        scale_status.resources[0].spec.replicas
      retries: 18
      delay: 10

    # ─────────────────────────────────────────
    # PHASE 5 — NOTIFICATION
    # ─────────────────────────────────────────

    - name: "[PHASE 5] Write email body to temp file"
      copy:
        dest: /tmp/cpu_email_body.txt
        content: |
          RF-02 Autonomous Remediation Platform — Alert

          Severity    : CRITICAL
          Scenario    : S2 — CPU Throttling Detection & Remediation
          Time        : {{ ansible_date_time.iso8601 }}

          AFFECTED SERVICE
          ─────────────────────────────────────────────────────
          Namespace   : {{ app_namespace }}
          Pod         : {{ throttled_pod }}
          Container   : {{ throttled_container }}
          Deployment  : {{ deployment_name }}

          REMEDIATION APPLIED
          ─────────────────────────────────────────────────────
          Strategy    : Vertical + Horizontal scaling
          CPU Limit   : {{ current_cpu_raw }} → {{ new_cpu_limit }}
          Replicas    : {{ current_replicas }} → {{ new_replicas }}
          Reason      : CPU throttled >60% of scheduling periods for 2+ minutes.
                        Increasing CPU budget and distributing load across more pods.

          OUTCOME
          ─────────────────────────────────────────────────────
          Deployment rollout completed successfully.
          All pods are healthy and ready.

          ──────────────────────────────────────────────────────
          This action was performed automatically by RF-02.
          No manual intervention was required.
          ──────────────────────────────────────────────────────
      no_log: true

    - name: "[PHASE 5] Write email send script"
      copy:
        dest: /tmp/cpu_send_email.py
        content: |
          import smtplib
          from email.mime.text import MIMEText
          body = open('/tmp/cpu_email_body.txt').read()
          msg = MIMEText(body)
          msg['Subject'] = '[RF-02] CPU Throttling Remediated — {{ deployment_name }}'
          msg['From'] = '{{ smtp_user }}'
          msg['To'] = '{{ smtp_user }}'
          s = smtplib.SMTP('smtp.gmail.com', 587)
          s.starttls()
          s.login('{{ smtp_user }}', '{{ smtp_password }}')
          s.sendmail('{{ smtp_user }}', '{{ smtp_user }}', msg.as_string())
          s.quit()
          print('Email sent successfully')
      no_log: true

    - name: "[PHASE 5] Send remediation email"
      command: python3 /tmp/cpu_send_email.py

    - name: "[PHASE 5] Final summary log"
      debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "  ✅ Remediation COMPLETE"
          - "  Deployment : {{ deployment_name }}"
          - "  CPU Limit  : {{ current_cpu_raw }} → {{ new_cpu_limit }}"
          - "  Replicas   : {{ current_replicas }} → {{ new_replicas }}"
          - "  Email      : sent to {{ smtp_user }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
