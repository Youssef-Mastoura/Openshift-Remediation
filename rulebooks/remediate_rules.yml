---
- name: Listen for OpenShift Alerts
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: Trigger Memory Fix
      condition: event.payload.alerts is selectattr("labels.remediation", "==", "increase-mem")
      action:
        run_job_template:
          name: "Fix OOM Template"
          organization: "Default"
          job_args:
            extra_vars:
              event: "{{ event }}"
