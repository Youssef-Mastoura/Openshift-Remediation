      ansible.builtin.fail:
        msg: "Deployment '{{ deployment_name }}' not found in namespace '{{ namespace }}' — aborting remediation"
      when: deployment_info.resources | length == 0

    - name: "[PRE-CHECK] Extract current values from deployment spec"
      set_fact:
        current_replicas: "{{ deployment_info.resources[0].spec.replicas | default(1) | int }}"
        current_image: "{{ deployment_info.resources[0].spec.template.spec.containers[0].image }}"
        current_container_name: "{{ deployment_info.resources[0].spec.template.spec.containers[0].name }}"
        current_memory_raw: "{{ deployment_info.resources[0].spec.template.spec.containers[0].resources.limits.memory | default('256Mi') }}"
        current_cpu_raw: "{{ deployment_info.resources[0].spec.template.spec.containers[0].resources.limits.cpu | default('100m') }}"

    - name: "[PRE-CHECK] Get current pod list for diagnostics"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ namespace }}"
        label_selectors:
          - "app={{ deployment_name }}"
        validate_certs: false
      register: diag_pods

    - name: "[PRE-CHECK] Save diagnostic snapshot to /tmp"
      ansible.builtin.copy:
        dest: "/tmp/prefas_diag_{{ deployment_name }}_{{ ansible_date_time.epoch }}.json"
        content: |
          {
            "snapshot_time": "{{ ansible_date_time.iso8601 }}",
            "deployment": "{{ deployment_name }}",
            "namespace": "{{ namespace }}",
            "pod_count": {{ diag_pods.resources | length }},
            "pods": {{ diag_pods.resources | map(attribute='metadata.name') | list | to_json }},
            "image": "{{ current_image | default('unknown') }}",
            "replicas": {{ current_replicas | default(1) }},
            "memory_limit": "{{ current_memory_raw | default('unknown') }}",
            "cpu_limit": "{{ current_cpu_raw | default('unknown') }}"
          }
        mode: "0644"
      ignore_errors: true

    - name: "[PRE-CHECK] Log diagnostic snapshot location"
      ansible.builtin.debug:
        msg: "Diagnostic snapshot saved: /tmp/prefas_diag_{{ deployment_name }}_{{ ansible_date_time.epoch }}.json ({{ diag_pods.resources | length }} pods)"

    - name: "[PRE-CHECK] Record baseline metrics for potential rollback"
      set_fact:
        baseline_replicas: "{{ current_replicas | default(1) | int }}"
        baseline_memory: "{{ current_memory_raw | default('256Mi') }}"
        baseline_cpu: "{{ current_cpu_raw | default('100m') }}"
        baseline_image: "{{ current_image | default('unknown') }}"
        baseline_timestamp: "{{ ansible_date_time.iso8601 }}"

    - name: "[PRE-CHECK] Log baseline snapshot"
      ansible.builtin.debug:
        msg: >-
          Baseline recorded: replicas={{ baseline_replicas }},
          memory={{ baseline_memory }}, cpu={{ baseline_cpu }},
          image={{ baseline_image }}

    - name: "[ACTION] Get all volumes in deployment spec"
      set_fact:
        all_volumes: "{{ deployment_info.resources[0].spec.template.spec.volumes | default([]) }}"
        all_volume_mounts: "{{ deployment_info.resources[0].spec.template.spec.containers[0].volumeMounts | default([]) }}"

    - name: "[ACTION] Check which secret volumes are missing"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        namespace: "{{ namespace }}"
        validate_certs: false
      register: all_secrets

    - name: "[ACTION] Check which configmap volumes are missing"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: ConfigMap
        namespace: "{{ namespace }}"
        validate_certs: false
      register: all_configmaps

    - name: "[ACTION] Build list of existing secret and configmap names"
      set_fact:
        existing_secrets: "{{ all_secrets.resources | map(attribute='metadata.name') | list }}"
        existing_configmaps: "{{ all_configmaps.resources | map(attribute='metadata.name') | list }}"

    - name: "[ACTION] Identify bad volume names (reference missing secrets/configmaps)"
      set_fact:
        bad_volume_names: >-
          {{ (all_volumes
              | selectattr('secret', 'defined')
              | rejectattr('secret.secretName', 'in', existing_secrets)
              | map(attribute='name') | list)
             +
             (all_volumes
              | selectattr('configMap', 'defined')
              | rejectattr('configMap.name', 'in', existing_configmaps)
              | map(attribute='name') | list) }}

    - name: "[ACTION] Remove volumes via JSON patch"
      kubernetes.core.k8s:
        state: patched
        api_version: apps/v1
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ namespace }}"
        validate_certs: false
        merge_type: json
        definition:
          - op: remove
            path: /spec/template/spec/volumes
      when: bad_volume_names | length > 0
      ignore_errors: true

    - name: "[ACTION] Remove volumeMounts via JSON patch"
      kubernetes.core.k8s:
        state: patched
        api_version: apps/v1
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ namespace }}"
        validate_certs: false
        merge_type: json
        definition:
          - op: remove
            path: /spec/template/spec/containers/0/volumeMounts
      when: bad_volume_names | length > 0
      ignore_errors: true

    - name: "[ACTION] Rolling restart to apply clean volume spec"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ deployment_name }}"
            namespace: "{{ namespace }}"
            annotations:
              remediation/action: "clear-stuck-mount"
              remediation/triggered-by: "RF-02-PREFAS"
              remediation/timestamp: "{{ ansible_date_time.iso8601 }}"
              remediation/removed-volumes: "{{ bad_volume_names | join(',') }}"
          spec:
            template:
              metadata:
                annotations:
                  kubectl.kubernetes.io/restartedAt: "{{ ansible_date_time.iso8601 }}"

    - name: "[ACTION] Rolling restart via annotation patch"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ deployment_name }}"
            namespace: "{{ namespace }}"
            annotations:
              remediation/action: "rolling-restart"
              remediation/triggered-by: "RF-02-PREFAS"
              remediation/timestamp: "{{ ansible_date_time.iso8601 }}"
          spec:
            template:
              metadata:
                annotations:
                  kubectl.kubernetes.io/restartedAt: "{{ ansible_date_time.iso8601 }}"

