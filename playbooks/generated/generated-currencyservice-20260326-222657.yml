---
- name: Remediate Unhealthy Pod
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    app_namespace: ms-demo

  tasks:

    - name: Extract alert labels
      set_fact:
        pod_name: "{{ event.payload.alerts[0].labels.pod_name }}"
        pod_namespace: "{{ event.payload.alerts[0].labels.pod_namespace }}"

    - name: Log remediation start
      debug:
        msg: "Unhealthy pod alert fired — pod={{ pod_name }} namespace={{ pod_namespace }}"

    - name: Create working directory
      file:
        path: "/tmp/unhealthy-pod-{{ ansible_date_time.epoch }}"
        state: directory
        mode: '0700'
      register: work_dir_info

    - name: Set work_dir fact
      set_fact:
        work_dir: "/tmp/unhealthy-pod-{{ ansible_date_time.epoch }}"

    - name: Derive deployment name from pod name
      set_fact:
        deployment_name: "{{ pod_name | regex_replace('-[a-z0-9]+-[a-z0-9]+$', '') }}"

    - name: Get current replicas
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ pod_namespace }}"
        validate_certs: false
      register: deployment_info

    - name: Set current replicas fact
      set_fact:
        current_replicas: "{{ deployment_info.resources[0].spec.replicas }}"

    - name: Scale down deployment
      kubernetes.core.k8s_scale:
        api_version: apps/v1
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ pod_namespace }}"
        replicas: 0
        validate_certs: false

    - name: Wait for deployment to scale down
      wait_for:
        timeout: 300

    - name: Patch deployment with updated configuration
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ deployment_name }}"
            namespace: "{{ pod_namespace }}"
          spec:
            template:
              spec:
                containers:
                - name: currencyservice
                  readinessProbe:
                    httpGet:
                      path: /health
                      port: 8080
                    initialDelaySeconds: 15
                    periodSeconds: 15

    - name: Scale up deployment
      kubernetes.core.k8s_scale:
        api_version: apps/v1
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ pod_namespace }}"
        replicas: "{{ current_replicas * 1.5 | int }}"
        validate_certs: false

    - name: Wait for deployment to scale up
      wait_for:
        timeout: 300

    - name: Clean up working directory
      file:
        path: "{{ work_dir }}"
        state: absent

    - name: Log remediation complete
      debug:
        msg: "Unhealthy pod remediation complete — pod={{ pod_name }} deployment={{ deployment_name }}"

    - name: Send email notification
      shell: >
        python3 -c "
        import smtplib
        from email.mime.text import MIMEText
        msg = MIMEText('Unhealthy pod remediation completed.\n\nPod: {{ pod_name }}\nNamespace: {{ pod_namespace }}\nDeployment: {{ deployment_name }}')
        msg[\"Subject\"] = \"[RF-01] Unhealthy Pod Remediated — {{ pod_name }}\"
        msg[\"From\"] = \"rf01@linsoft.tn\"
        msg[\"To\"] = \"admin@linsoft.tn\"
        s = smtplib.SMTP(\"localhost\", 25)
        s.send_message(msg)
        s.quit()
        "
      ignore_errors: true
      no_log: true