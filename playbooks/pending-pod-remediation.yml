---
- name: S7 - Pending Pod Remediation (3 causes)
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    app_namespace: ms-demo

  tasks:

    - name: Extract alert info from event
      set_fact:
        alert_pod: "{{ event.payload.alerts[0].labels.pod }}"
        remediation_type: "{{ event.payload.alerts[0].labels.remediation }}"

    - name: Log remediation start
      debug:
        msg: "Pending pod alert fired — pod={{ alert_pod }} cause={{ remediation_type }}"

    - name: Derive deployment name from pod name
      set_fact:
        deployment_name: "{{ alert_pod | regex_replace('-[a-z0-9]+-[a-z0-9]+$', '') }}"

    - name: Log derived deployment name
      debug:
        msg: "Derived deployment name: {{ deployment_name }}"

    - name: Get Deployment info
      kubernetes.core.k8s_info:
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: deployment_info

    # ─────────────────────────────────────────────
    # CAUSE DETECTION — Read scheduler events
    # ─────────────────────────────────────────────

    - name: Get all events in namespace
      kubernetes.core.k8s_info:
        kind: Event
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: all_events
      when: remediation_type == "pending-pod-unschedulable"

    - name: Filter FailedScheduling events for this pod
      set_fact:
        pod_events: >-
          {{ all_events.resources
             | selectattr('involvedObject.name', '==', alert_pod)
             | selectattr('reason', '==', 'FailedScheduling')
             | map(attribute='message') | list }}
      when: remediation_type == "pending-pod-unschedulable"

    - name: Detect cause from scheduler message
      set_fact:
        has_affinity_issue: >-
          {{ pod_events | select('search', 'affinity|selector') | list | length > 0 }}
      when: remediation_type == "pending-pod-unschedulable"

    - name: Log cause detection result
      debug:
        msg: "affinity_issue={{ has_affinity_issue }} | events={{ pod_events }}"
      when: remediation_type == "pending-pod-unschedulable"

    # ─────────────────────────────────────────────
    # CAUSE 2 — Node Affinity/Selector Mismatch
    # ─────────────────────────────────────────────

    - name: "[Affinity] Remove nodeSelector and affinity from deployment"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ deployment_name }}"
            namespace: "{{ app_namespace }}"
            annotations:
              remediation/affinity-removed-at: "{{ ansible_date_time.iso8601 }}"
          spec:
            template:
              spec:
                nodeSelector: null
                affinity: null
      when:
        - remediation_type == "pending-pod-unschedulable"
        - has_affinity_issue | bool

    - name: "[Affinity] Log fix applied"
      debug:
        msg: "Removed nodeSelector/affinity from {{ deployment_name }}"
      when:
        - remediation_type == "pending-pod-unschedulable"
        - has_affinity_issue | bool

    # ─────────────────────────────────────────────
    # CAUSE 1 — Insufficient Resources
    # ─────────────────────────────────────────────

    - name: "[Resources] Extract container name and current requests"
      set_fact:
        container_name: >-
          {{ deployment_info.resources[0].spec.template.spec.containers[0].name }}
        current_cpu_request: >-
          {{ deployment_info.resources[0].spec.template.spec.containers[0]
             .resources.requests.cpu | default('100m') }}
        current_mem_request: >-
          {{ deployment_info.resources[0].spec.template.spec.containers[0]
             .resources.requests.memory | default('128Mi') }}
      when:
        - remediation_type == "pending-pod-unschedulable"
        - not (has_affinity_issue | bool)

    - name: "[Resources] Convert CPU request to millicores"
      set_fact:
        cpu_millicores: "{{ current_cpu_request | regex_replace('m', '') | int }}"
      when:
        - remediation_type == "pending-pod-unschedulable"
        - not (has_affinity_issue | bool)

    - name: "[Resources] Convert memory request to Mi"
      set_fact:
        mem_mi: "{{ current_mem_request | regex_replace('Mi', '') | int }}"
      when:
        - remediation_type == "pending-pod-unschedulable"
        - not (has_affinity_issue | bool)

    - name: "[Resources] Compute reduced requests (×0.75)"
      set_fact:
        new_cpu_request: "{{ (cpu_millicores | int * 0.75) | int }}m"
        new_mem_request: "{{ (mem_mi | int * 0.75) | int }}Mi"
      when:
        - remediation_type == "pending-pod-unschedulable"
        - not (has_affinity_issue | bool)

    - name: "[Resources] Log current and new resource requests"
      debug:
        msg: >
          CPU: {{ current_cpu_request }} → {{ new_cpu_request }}
          | Memory: {{ current_mem_request }} → {{ new_mem_request }}
      when:
        - remediation_type == "pending-pod-unschedulable"
        - not (has_affinity_issue | bool)

    - name: "[Resources] Patch deployment with reduced resource requests"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ deployment_name }}"
            namespace: "{{ app_namespace }}"
            annotations:
              remediation/resources-reduced-at: "{{ ansible_date_time.iso8601 }}"
              remediation/previous-cpu-request: "{{ current_cpu_request }}"
              remediation/new-cpu-request: "{{ new_cpu_request }}"
          spec:
            template:
              spec:
                containers:
                  - name: "{{ container_name }}"
                    resources:
                      requests:
                        cpu: "{{ new_cpu_request }}"
                        memory: "{{ new_mem_request }}"
      when:
        - remediation_type == "pending-pod-unschedulable"
        - not (has_affinity_issue | bool)

    # ─────────────────────────────────────────────
    # CAUSE 3 — PVC Not Bound
    # ─────────────────────────────────────────────

    - name: "[PVC] Find all PVCs in namespace"
      kubernetes.core.k8s_info:
        kind: PersistentVolumeClaim
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: all_pvcs
      when: remediation_type == "pending-pod-pvc"

    - name: "[PVC] Filter pending PVCs"
      set_fact:
        pending_pvcs: >-
          {{ all_pvcs.resources | selectattr('status.phase', '==', 'Pending') | list }}
      when: remediation_type == "pending-pod-pvc"

    - name: "[PVC] Log pending PVCs found"
      debug:
        msg: "Found {{ pending_pvcs | length }} pending PVC(s): {{ pending_pvcs | map(attribute='metadata.name') | list }}"
      when: remediation_type == "pending-pod-pvc"

    - name: "[PVC] Delete pending PVCs to force reprovisioning"
      kubernetes.core.k8s:
        state: absent
        validate_certs: false
        kind: PersistentVolumeClaim
        name: "{{ item.metadata.name }}"
        namespace: "{{ app_namespace }}"
      loop: "{{ pending_pvcs }}"
      when:
        - remediation_type == "pending-pod-pvc"
        - pending_pvcs | length > 0

    # ─────────────────────────────────────────────
    # FINAL — Wait and Report
    # ─────────────────────────────────────────────

    - name: Wait for deployment rollout to complete
      kubernetes.core.k8s_info:
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: rollout_status
      until: >-
        rollout_status.resources[0].status.readyReplicas is defined and
        rollout_status.resources[0].status.readyReplicas ==
        rollout_status.resources[0].spec.replicas
      retries: 12
      delay: 10
      when: remediation_type != "pending-pod-pvc"

    - name: Report remediation complete
      debug:
        msg: >
          S7 remediation complete for {{ deployment_name }}
          | cause: {{ remediation_type }}
          | namespace: {{ app_namespace }}
