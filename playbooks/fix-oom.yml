---
- name: Remediation - Scale Up Memory
  hosts: localhost
  connection: local
  tasks:
    - name: Patch Deployment with more memory
      kubernetes.core.k8s:
        state: patched
        kind: Deployment
        # Use the 'event' variable which is passed by the rulebook
        name: "{{ event.payload.alerts[0].labels.app }}"
        namespace: "ms-demo"
        definition:
          spec:
            template:
              spec:
                containers:
                  - name: server
                    resources:
                      limits:
                        memory: "512Mi"
