---
- name: CPU Throttling Remediation
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    app_namespace: ms-demo
    new_cpu_limit: "300m"
    prometheus_url: "http://prometheus-operated.openshift-user-workload-monitoring.svc.cluster.local:9090"
    throttling_threshold: "0.25"

  tasks:

    - name: Log remediation start
      debug:
        msg: "CPU throttling alert fired in {{ app_namespace }} — querying Prometheus to find throttled containers"

    - name: Query Prometheus for throttled containers
      uri:
        url: "{{ prometheus_url }}/api/v1/query?query=rate(container_cpu_cfs_throttled_periods_total%7Bnamespace%3D%22{{ app_namespace }}%22%2Ccontainer%21%3D%22%22%2Ccontainer%21%3D%22POD%22%7D%5B5m%5D)%2Frate(container_cpu_cfs_periods_total%7Bnamespace%3D%22{{ app_namespace }}%22%2Ccontainer%21%3D%22%22%2Ccontainer%21%3D%22POD%22%7D%5B5m%5D)%3E{{ throttling_threshold }}"
        method: GET
        validate_certs: false
        return_content: true
      register: prometheus_response

    - name: Parse throttled containers from Prometheus response
      set_fact:
        throttled_containers: >-
          {{ prometheus_response.json.data.result
             | map(attribute='metric')
             | list }}

    - name: Log throttled containers found
      debug:
        msg: "Throttled containers: {{ throttled_containers }}"

    - name: Fail gracefully if no throttled containers found
      fail:
        msg: "No throttled containers found above threshold. Nothing to remediate."
      when: throttled_containers | length == 0

    - name: Get pod info for each throttled container
      kubernetes.core.k8s_info:
        kind: Pod
        name: "{{ item.pod }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: pod_infos
      loop: "{{ throttled_containers }}"

    - name: Extract replicaset names from pod owner references
      set_fact:
        replicaset_names: >-
          {{ replicaset_names | default([]) + [
            {
              'replicaset': item.resources[0].metadata.ownerReferences
                | selectattr('kind', '==', 'ReplicaSet')
                | map(attribute='name')
                | first,
              'container': item.resources[0].spec.containers[0].name
            }
          ] }}
      loop: "{{ pod_infos.results }}"

    - name: Get ReplicaSet info to find Deployment names
      kubernetes.core.k8s_info:
        kind: ReplicaSet
        name: "{{ item.replicaset }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: rs_infos
      loop: "{{ replicaset_names }}"

    - name: Extract deployment names
      set_fact:
        deployment_targets: >-
          {{ deployment_targets | default([]) + [
            {
              'deployment': item.resources[0].metadata.ownerReferences
                | selectattr('kind', '==', 'Deployment')
                | map(attribute='name')
                | first,
              'container': replicaset_names[idx].container
            }
          ] }}
      loop: "{{ rs_infos.results }}"
      loop_control:
        index_var: idx

    - name: Log deployment targets
      debug:
        msg: "Deployment targets to remediate: {{ deployment_targets }}"

    - name: Increase CPU limit on throttled deployments only
      kubernetes.core.k8s:
        validate_certs: false
        state: patched
        kind: Deployment
        name: "{{ item.deployment }}"
        namespace: "{{ app_namespace }}"
        definition:
          metadata:
            annotations:
              remediation/cpu-limit-increased-at: "{{ ansible_date_time.iso8601 }}"
          spec:
            template:
              spec:
                containers:
                  - name: "{{ item.container }}"
                    resources:
                      limits:
                        cpu: "{{ new_cpu_limit }}"
      loop: "{{ deployment_targets }}"

    - name: Log remediation complete
      debug:
        msg: "CPU limit increased to {{ new_cpu_limit }} on: {{ deployment_targets | map(attribute='deployment') | list }}"
