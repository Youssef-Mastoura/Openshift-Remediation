---
- name: Listen for OpenShift Alerts
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: Trigger Memory Fix
      # This matches the label you created in your PrometheusRule
      condition: event.payload.alerts[0].labels.remediation == "increase-mem"
      action:
        run_job_template:
          name: "Fix OOM Template"
          organization: "Default"