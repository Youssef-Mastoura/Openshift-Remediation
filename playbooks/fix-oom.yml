---
- name: Remediation - Scale Up Memory
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Patch Deployment with more memory
      kubernetes.core.k8s:
        # No host, api_key, or ca_cert needed if RBAC is set up
        state: patched
        kind: Deployment
        name: "{{ event.payload.alerts[0].labels.app }}"
        namespace: "ms-demo"
        definition:
          spec:
            template:
              spec:
                containers:
                  - name: "{{ event.payload.alerts[0].labels.app }}"
                    resources:
                      limits:
                        memory: "512Mi"
