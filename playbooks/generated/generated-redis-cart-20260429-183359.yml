---
# Generated by PREFAS v3 — library-based assembler
# Root cause: PersistentVolumeClaim for redis-cart cannot be bound because the specified StorageClass 'manual' does not exist in the cluster.
# Category:   storage_issue
# Confidence: 62%
# Planner:    Root cause is an unbound PVC because StorageClass 'manual' does not exist, matching PATTERN 5 (PVC UNBOUND). The create_matching_pv task auto-detects the PVC name, storage size, and node hostname to p
# Tasks:      10 selected from library

- name: "PREFAS remediation — storage_issue"
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    namespace: "{{ event_data.namespace | default('ms-demo') }}"
    pod_name:  "{{ event_data.pod }}"
    incident_id: "{{ incident_id | default(0) }}"
    rca_summary: "PersistentVolumeClaim for redis-cart cannot be bound because the specified StorageClass 'manual' does not exist in the cluster."
  tasks:
    - name: "[PRE-CHECK] Extract deployment name from pod name"
      set_fact:
        deployment_name: "{{ pod_name | regex_replace('-[a-z0-9]+-[a-z0-9]+$', '') }}"
 

    - name: "[PRE-CHECK] Fetch deployment spec from Kubernetes API"
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ namespace }}"
        validate_certs: false
      register: deployment_info

    - name: "[PRE-CHECK] Verify deployment exists"
      ansible.builtin.fail:
        msg: "Deployment '{{ deployment_name }}' not found in namespace '{{ namespace }}' — aborting remediation"
      when: deployment_info.resources | length == 0

    - name: "[PRE-CHECK] Extract current values from deployment spec"
      set_fact:
        current_replicas: "{{ deployment_info.resources[0].spec.replicas | default(1) | int }}"
        current_image: "{{ deployment_info.resources[0].spec.template.spec.containers[0].image }}"
        current_container_name: "{{ deployment_info.resources[0].spec.template.spec.containers[0].name }}"
        current_memory_raw: "{{ deployment_info.resources[0].spec.template.spec.containers[0].resources.limits.memory | default('256Mi') }}"
        current_cpu_raw: "{{ deployment_info.resources[0].spec.template.spec.containers[0].resources.limits.cpu | default('100m') }}"

    - name: "[ACTION] Auto-detect stuck PVC name from deployment volume mounts"
      set_fact:
        detected_pvc_name: >-
          {{ (deployment_info.resources[0].spec.template.spec.volumes
             | selectattr('persistentVolumeClaim', 'defined')
             | map(attribute='persistentVolumeClaim.claimName')
             | list | first) | default('') }}

    - name: "[ACTION] Fail if no PVC found in deployment"
      ansible.builtin.fail:
        msg: "No PersistentVolumeClaim found in deployment {{ deployment_name }} volume mounts"
      when: detected_pvc_name | length == 0

    - name: "[ACTION] Fetch the stuck PVC"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: PersistentVolumeClaim
        name: "{{ detected_pvc_name }}"
        namespace: "{{ namespace }}"
        validate_certs: false
      register: pvc_info

    - name: "[ACTION] Extract PVC metadata"
      set_fact:
        pvc_storage_class: >-
          {{ pvc_info.resources[0].spec.storageClassName
             if (pvc_info.resources | length > 0 and
                 pvc_info.resources[0].spec.storageClassName is defined)
             else 'manual' }}
        pvc_storage_size: >-
          {{ pvc_info.resources[0].spec.resources.requests.storage
             if (pvc_info.resources | length > 0 and
                 pvc_info.resources[0].spec.resources.requests.storage is defined)
             else '1Gi' }}

    - name: "[ACTION] Get node hostname for PV affinity"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
        validate_certs: false
      register: node_info

    - name: "[ACTION] Create matching PersistentVolume"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: v1
          kind: PersistentVolume
          metadata:
            name: "prefas-pv-{{ detected_pvc_name }}-{{ ansible_date_time.epoch }}"
            annotations:
              remediation/action: "create-pv"
              remediation/triggered-by: "RF-02-PREFAS"
              remediation/for-pvc: "{{ detected_pvc_name }}"
          spec:
            capacity:
              storage: "{{ pvc_storage_size }}"
            volumeMode: Filesystem
            accessModes:
              - ReadWriteOnce
            persistentVolumeReclaimPolicy: Retain
            storageClassName: "{{ pvc_storage_class }}"
            hostPath:
              path: "/mnt/prefas-pv/{{ detected_pvc_name }}"
              type: DirectoryOrCreate
            claimRef:
              name: "{{ detected_pvc_name }}"
              namespace: "{{ namespace }}"
            nodeAffinity:
              required:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values:
                          - "{{ node_info.resources[0].metadata.name }}"

    - name: "[POST-CHECK] Wait for deployment rollout to complete (max 3min)"
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ namespace }}"
        validate_certs: false
      register: rollout_status
      until: >-
        rollout_status.resources[0].status.readyReplicas is defined
        and rollout_status.resources[0].status.readyReplicas | int
            >= rollout_status.resources[0].spec.replicas | int
      retries: 18
      delay: 10
      ignore_errors: true

    - name: "[POST-CHECK] Verify at least one pod is Ready"
      set_fact:
        rollout_success: >-
          {{ rollout_status.resources[0].status.readyReplicas is defined
             and rollout_status.resources[0].status.readyReplicas | int >= 1 }}

    - name: "[POST-CHECK] Log rollout result"
      ansible.builtin.debug:
        msg: >-
          Rollout {{ 'SUCCEEDED' if rollout_success else 'FAILED' }}:
          deployment={{ deployment_name }} |
          ready={{ rollout_status.resources[0].status.readyReplicas | default(0) }} |
          desired={{ rollout_status.resources[0].spec.replicas }}

    - name: "[NOTIFY] Annotate deployment with PREFAS remediation metadata"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ deployment_name }}"
            namespace: "{{ namespace }}"
            annotations:
              remediation/last-remediated-at: "{{ ansible_date_time.iso8601 }}"
              remediation/last-incident-id: "{{ incident_id | default('N/A') | string }}"
              remediation/triggered-by: "RF-02-PREFAS"

    - name: "[NOTIFY] Write email body to temp file"
      ansible.builtin.copy:
        dest: "/tmp/prefas_email_body_{{ deployment_name }}.txt"
        content: |
          PREFAS Autonomous Remediation Platform

          Time        : {{ ansible_date_time.iso8601 }}
          Deployment  : {{ deployment_name }}
          Namespace   : {{ namespace }}
          Pod         : {{ pod_name }}

          ROOT CAUSE
          ─────────────────────────────────────────
          {{ rca_summary | default('(see PREFAS UI for full diagnosis)') }}

          ACTION TAKEN
          ─────────────────────────────────────────
          Created a hostPath PersistentVolume matching the unbound PVC for redis-cart to resolve FailedScheduling due to missing StorageClass 'manual'.

          OUTCOME
          ─────────────────────────────────────────
          Rollout status : {{ 'SUCCESS' if (rollout_success | default(true)) else 'FAILED' }}
          Service ready  : {{ 'YES' if (service_reachable | default(true)) else 'NO' }}

          ─────────────────────────────────────────
          This action was performed automatically by PREFAS.
          Check the PREFAS UI for incident #{{ incident_id | default('N/A') }}.
          ─────────────────────────────────────────
      no_log: true

    - name: "[NOTIFY] Write Python SMTP script"
      ansible.builtin.copy:
        dest: "/tmp/prefas_send_email_{{ deployment_name }}.py"
        content: |
          import smtplib
          from email.mime.text import MIMEText
          body = open('/tmp/prefas_email_body_{{ deployment_name }}.txt').read()
          msg = MIMEText(body)
          msg['Subject'] = '[PREFAS] Remediation: {{ deployment_name }} incident {{ incident_id | default(0) }}'
          msg['From']    = '{{ smtp_user }}'
          msg['To']      = '{{ smtp_user }}'
          s = smtplib.SMTP('smtp.gmail.com', 587, timeout=15)
          s.starttls()
          s.login('{{ smtp_user }}', '{{ smtp_password }}')
          s.sendmail('{{ smtp_user }}', '{{ smtp_user }}', msg.as_string())
          s.quit()
          print('Email sent')
      no_log: true

    - name: "[NOTIFY] Send email notification"
      ansible.builtin.command: "python3 /tmp/prefas_send_email_{{ deployment_name }}.py"
      ignore_errors: true

    - name: "[NOTIFY] Report outcome to PREFAS engine"
      ansible.builtin.uri:
        url: "http://prefas-engine.ms-demo.svc.cluster.local:8000/feedback"
        method: POST
        body_format: json
        body:
          incident_id: "{{ incident_id | default(0) | int }}"
          outcome: "{{ 'resolved' if (rollout_success | default(true)) else 'failed' }}"
          note: "Created a hostPath PersistentVolume matching the unbound PVC for redis-cart to resolve FailedScheduling due to missing StorageClass 'manual'."
        status_code:
          - 200
          - 201
          - 204
        validate_certs: false
      ignore_errors: true
