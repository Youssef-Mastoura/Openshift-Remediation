      ansible.builtin.uri:
        url: "http://prefas-engine.ms-demo.svc.cluster.local:8000/feedback"
        method: POST
        body_format: json
        body:
          incident_id: "{{ incident_id | default(0) | int }}"
          outcome: "{{ 'resolved' if (rollout_success | default(true)) else 'failed' }}"
          note: "The pod is stuck in ContainerCreating due to a FailedMount referencing a non-existent Secret 'nonexistent-secret-prefas'. clear_stuck_mount is the correct task to remove the bad volume reference and d"
