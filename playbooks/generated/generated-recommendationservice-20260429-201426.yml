---
# Generated by PREFAS v3 — library-based assembler
# Root cause: CPU limit is set too low for the container, causing severe throttling (87.4%) under normal load, which will degrade response latency.
# Category:   resource_exhaustion
# Confidence: 79%
# Planner:    Root cause analysis shows CPU throttling at 87.4% with no OOM events, matching PATTERN 10 (CPU THROTTLING ONLY). increase_cpu with multiplier 1.5 directly addresses the low CPU limit. increase_memory 
# Tasks:      12 selected from library

- name: "PREFAS remediation — resource_exhaustion"
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    namespace: "{{ event_data.namespace | default('ms-demo') }}"
    pod_name:  "{{ event_data.pod }}"
    incident_id: "{{ incident_id | default(0) }}"
    rca_summary: "CPU limit is set too low for the container, causing severe throttling (87.4%) under normal load, which will degrade response latency."
  tasks:
    - name: "[PRE-CHECK] Extract deployment name from pod name"
      set_fact:
        deployment_name: "{{ pod_name | regex_replace('-[a-z0-9]+-[a-z0-9]+$', '') }}"
 

    - name: "[PRE-CHECK] Fetch deployment spec from Kubernetes API"
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ namespace }}"
        validate_certs: false
      register: deployment_info

    - name: "[PRE-CHECK] Verify deployment exists"
      ansible.builtin.fail:
        msg: "Deployment '{{ deployment_name }}' not found in namespace '{{ namespace }}' — aborting remediation"
      when: deployment_info.resources | length == 0

    - name: "[PRE-CHECK] Extract current values from deployment spec"
      set_fact:
        current_replicas: "{{ deployment_info.resources[0].spec.replicas | default(1) | int }}"
        current_image: "{{ deployment_info.resources[0].spec.template.spec.containers[0].image }}"
        current_container_name: "{{ deployment_info.resources[0].spec.template.spec.containers[0].name }}"
        current_memory_raw: "{{ deployment_info.resources[0].spec.template.spec.containers[0].resources.limits.memory | default('256Mi') }}"
        current_cpu_raw: "{{ deployment_info.resources[0].spec.template.spec.containers[0].resources.limits.cpu | default('100m') }}"

    - name: "[PRE-CHECK] Normalize CPU limit to millicores"
      set_fact:
        current_cpu_m: >-
          {%- set v = current_cpu_raw | string -%}
          {%- if 'm' in v -%}
            {{ v | regex_replace('[^0-9.]', '') | float | round(0, 'ceil') | int }}
          {%- else -%}
            {{ (v | regex_replace('[^0-9.]', '') | float * 1000) | round(0, 'ceil') | int }}
          {%- endif -%}

    - name: "[PRE-CHECK] Record baseline metrics for potential rollback"
      set_fact:
        baseline_replicas: "{{ current_replicas | default(1) | int }}"
        baseline_memory: "{{ current_memory_raw | default('256Mi') }}"
        baseline_cpu: "{{ current_cpu_raw | default('100m') }}"
        baseline_image: "{{ current_image | default('unknown') }}"
        baseline_timestamp: "{{ ansible_date_time.iso8601 }}"

    - name: "[PRE-CHECK] Log baseline snapshot"
      ansible.builtin.debug:
        msg: >-
          Baseline recorded: replicas={{ baseline_replicas }},
          memory={{ baseline_memory }}, cpu={{ baseline_cpu }},
          image={{ baseline_image }}

    - name: "[ACTION] Increase CPU limit by {{ ((1.5 - 1.0) * 100) | int }}%"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ deployment_name }}"
            namespace: "{{ namespace }}"
            annotations:
              remediation/action: "cpu-increase"
              remediation/triggered-by: "RF-02-PREFAS"
              remediation/timestamp: "{{ ansible_date_time.iso8601 }}"
              remediation/previous-cpu: "{{ current_cpu_raw }}"
          spec:
            template:
              spec:
                containers:
                  - name: "{{ current_container_name }}"
                    resources:
                      limits:
                        cpu: "{{ (current_cpu_m | int * 1.5) | round(0, 'ceil') | int }}m"

    - name: "[POST-CHECK] Wait for deployment rollout to complete (max 3min)"
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ namespace }}"
        validate_certs: false
      register: rollout_status
      until: >-
        rollout_status.resources[0].status.readyReplicas is defined
        and rollout_status.resources[0].status.readyReplicas | int
            >= rollout_status.resources[0].spec.replicas | int
      retries: 18
      delay: 10
      ignore_errors: true

    - name: "[POST-CHECK] Verify at least one pod is Ready"
      set_fact:
        rollout_success: >-
          {{ rollout_status.resources[0].status.readyReplicas is defined
             and rollout_status.resources[0].status.readyReplicas | int >= 1 }}

    - name: "[POST-CHECK] Log rollout result"
      ansible.builtin.debug:
        msg: >-
          Rollout {{ 'SUCCEEDED' if rollout_success else 'FAILED' }}:
          deployment={{ deployment_name }} |
          ready={{ rollout_status.resources[0].status.readyReplicas | default(0) }} |
          desired={{ rollout_status.resources[0].spec.replicas }}

    - name: "[NOTIFY] Annotate deployment with PREFAS remediation metadata"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ deployment_name }}"
            namespace: "{{ namespace }}"
            annotations:
              remediation/last-remediated-at: "{{ ansible_date_time.iso8601 }}"
              remediation/last-incident-id: "{{ incident_id | default('N/A') | string }}"
              remediation/triggered-by: "RF-02-PREFAS"

    - name: "[NOTIFY] Write email body to temp file"
      ansible.builtin.copy:
        dest: "/tmp/prefas_email_body_{{ deployment_name }}.txt"
        content: |
          PREFAS Autonomous Remediation Platform

          Time        : {{ ansible_date_time.iso8601 }}
          Deployment  : {{ deployment_name }}
          Namespace   : {{ namespace }}
          Pod         : {{ pod_name }}

          ROOT CAUSE
          ─────────────────────────────────────────
          {{ rca_summary | default('(see PREFAS UI for full diagnosis)') }}

          ACTION TAKEN
          ─────────────────────────────────────────
          Increased CPU limit by 50% to resolve 87.4% throttling on recommendationservice

          OUTCOME
          ─────────────────────────────────────────
          Rollout status : {{ 'SUCCESS' if (rollout_success | default(true)) else 'FAILED' }}
          Service ready  : {{ 'YES' if (service_reachable | default(true)) else 'NO' }}

          ─────────────────────────────────────────
          This action was performed automatically by PREFAS.
          Check the PREFAS UI for incident #{{ incident_id | default('N/A') }}.
          ─────────────────────────────────────────
      no_log: true

    - name: "[NOTIFY] Write Python SMTP script"
      ansible.builtin.copy:
        dest: "/tmp/prefas_send_email_{{ deployment_name }}.py"
        content: |
          import smtplib
          from email.mime.text import MIMEText
          body = open('/tmp/prefas_email_body_{{ deployment_name }}.txt').read()
          msg = MIMEText(body)
          msg['Subject'] = '[PREFAS] Remediation: {{ deployment_name }} incident {{ incident_id | default(0) }}'
          msg['From']    = '{{ smtp_user }}'
          msg['To']      = '{{ smtp_user }}'
          s = smtplib.SMTP('smtp.gmail.com', 587, timeout=15)
          s.starttls()
          s.login('{{ smtp_user }}', '{{ smtp_password }}')
          s.sendmail('{{ smtp_user }}', '{{ smtp_user }}', msg.as_string())
          s.quit()
          print('Email sent')
      no_log: true

    - name: "[NOTIFY] Send email notification"
      ansible.builtin.command: "python3 /tmp/prefas_send_email_{{ deployment_name }}.py"
      ignore_errors: true

    - name: "[NOTIFY] Report outcome to PREFAS engine"
      ansible.builtin.uri:
        url: "http://prefas-engine.ms-demo.svc.cluster.local:8000/feedback"
        method: POST
        body_format: json
        body:
          incident_id: "{{ incident_id | default(0) | int }}"
          outcome: "{{ 'resolved' if (rollout_success | default(true)) else 'failed' }}"
          note: "Increased CPU limit by 50% to resolve 87.4% throttling on recommendationservice"
        status_code:
          - 200
          - 201
          - 204
        validate_certs: false
      ignore_errors: true
