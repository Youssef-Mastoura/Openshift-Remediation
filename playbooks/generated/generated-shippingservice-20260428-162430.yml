    rca_summary: "Pod shippingservice-7bc79bb5d5-xnpgs references a Kubernetes Secret 'nonexistent-secret-prefas' that does not exist in namespace ms-demo, preventing volume mount and pod startup."
  tasks:
    - name: "[PRE-CHECK] Extract deployment name from pod name"
      set_fact:
