---
- name: Unified OpenShift Remediation Rulebook
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:

    - name: Trigger OOMKilled Fix
      condition: event.payload.alerts is selectattr("labels.remediation", "==", "increase-mem")
      action:
        run_job_template:
          name: "Fix OOM Template"
          organization: "Default"
          job_args:
            extra_vars:
              event: "{{ event }}"

    - name: Trigger ConfigMap Desync Fix
      condition: event.payload.alerts is selectattr("labels.remediation", "==", "configmap-desync")
      action:
        run_job_template:
          name: "configmap-desync-remediation"
          organization: "Default"
          job_args:
            extra_vars:
              event: "{{ event }}"
              
    - name: Trigger Ephemeral Storage Fix
      condition: event.payload.alerts is selectattr("labels.remediation", "==", "ephemeral-storage-exhaustion")
      action:
        run_job_template:
          name: "ephemeral-storage-remediation"
          organization: "Default"
          job_args:
            extra_vars:
              event: "{{ event }}"
