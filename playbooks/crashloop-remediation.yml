---
- name: S6 - CrashLoopBackOff Bad Entrypoint Remediation
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    app_namespace: ms-demo

  tasks:

    # ─────────────────────────────────────────────
    # EXTRACT ALERT INFO
    # ─────────────────────────────────────────────

    - name: Extract pod and namespace from alert
      set_fact:
        alert_pod: "{{ event.payload.alerts[0].labels.pod }}"
        alert_namespace: "{{ event.payload.alerts[0].labels.namespace | default('ms-demo') }}"

    - name: Derive deployment name from pod name
      set_fact:
        deployment_name: "{{ alert_pod | regex_replace('-[a-z0-9]+-[a-z0-9]+$', '') }}"

    - name: Derive crashlooping RS name from pod name (strip pod suffix only)
      set_fact:
        bad_rs_name: "{{ alert_pod | regex_replace('-[a-z0-9]+$', '') }}"

    - name: Log remediation start
      debug:
        msg: "CrashLoopBackOff (exit 127) detected — pod={{ alert_pod }} deployment={{ deployment_name }} bad_rs={{ bad_rs_name }}"

    # ─────────────────────────────────────────────
    # GET CURRENT CONTAINER STATE FOR EMAIL DETAIL
    # ─────────────────────────────────────────────

    - name: Get pod info for detailed diagnostics
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ alert_namespace }}"
        label_selectors:
          - "app={{ deployment_name }}"
        validate_certs: false
      register: pod_info

    - name: Extract crashlooping pod details
      set_fact:
        crash_pod_detail: >-
          {{ pod_info.resources
             | selectattr('status.containerStatuses', 'defined')
             | selectattr('status.containerStatuses', 'ne', None)
             | list | first | default({}) }}

    - name: Extract last terminated info
      set_fact:
        last_exit_code: >-
          {{ crash_pod_detail.status.containerStatuses[0].lastState.terminated.exitCode
             | default(127) }}
        last_reason: >-
          {{ crash_pod_detail.status.containerStatuses[0].lastState.terminated.reason
             | default('Error') }}
        restart_count: >-
          {{ crash_pod_detail.status.containerStatuses[0].restartCount
             | default(0) }}
        container_name: >-
          {{ crash_pod_detail.spec.containers[0].name
             | default('server') }}
        current_command: >-
          {{ crash_pod_detail.spec.containers[0].command
             | default([]) | join(' ') }}

    - name: Log extracted diagnostics
      debug:
        msg: >
          pod={{ alert_pod }} container={{ container_name }}
          exit_code={{ last_exit_code }} reason={{ last_reason }}
          restarts={{ restart_count }} command={{ current_command }}

    # ─────────────────────────────────────────────
    # FIND HEALTHY RUNNING REPLICASET
    # ─────────────────────────────────────────────

    - name: Get all ReplicaSets for this deployment
      kubernetes.core.k8s_info:
        kind: ReplicaSet
        namespace: "{{ alert_namespace }}"
        label_selectors:
          - "app={{ deployment_name }}"
        validate_certs: false
      register: all_rs

    - name: Debug — show RS count and names
      debug:
        msg: "Total RS found: {{ all_rs.resources | length }} — names: {{ all_rs.resources | map(attribute='metadata.name') | list }}"

    - name: Find healthy RS (replicas > 0, not the crashlooping one)
      set_fact:
        healthy_rs: >-
          {{ all_rs.resources
             | selectattr('status.replicas', 'defined')
             | selectattr('status.replicas', '>', 0)
             | rejectattr('metadata.name', 'equalto', bad_rs_name)
             | sort(attribute='metadata.creationTimestamp')
             | last | default({}) }}

    - name: Extract healthy RS image and command
      set_fact:
        previous_image: "{{ healthy_rs.spec.template.spec.containers[0].image | default('') }}"
        previous_command: "{{ healthy_rs.spec.template.spec.containers[0].command | default([]) }}"
      when: healthy_rs | length > 0

    - name: Set empty values if no healthy RS found
      set_fact:
        previous_image: ""
        previous_command: []
      when: healthy_rs | length == 0

    - name: Evaluate whether a healthy RS exists
      set_fact:
        has_previous_revision: "{{ healthy_rs | length > 0 and previous_image | length > 0 }}"

    - name: Log healthy RS check
      debug:
        msg: >
          Healthy RS found: {{ has_previous_revision }}
          — image={{ previous_image }}
          — command={{ previous_command }}

    # ─────────────────────────────────────────────
    # PATH A — ROLLBACK (healthy RS exists)
    # ─────────────────────────────────────────────

    - name: "[Rollback] Patch deployment to healthy RS image and command"
      kubernetes.core.k8s:
        validate_certs: false
        state: patched
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ alert_namespace }}"
        definition:
          metadata:
            annotations:
              remediation/crashloop-rolled-back-at: "{{ ansible_date_time.iso8601 }}"
          spec:
            template:
              spec:
                containers:
                  - name: "{{ container_name }}"
                    image: "{{ previous_image }}"
                    command: "{{ previous_command }}"
      when: has_previous_revision | bool
      register: rollback_result

    - name: "[Rollback] Log rollback applied"
      debug:
        msg: "Rolled back {{ deployment_name }} — restored image={{ previous_image }} command={{ previous_command }}"
      when: has_previous_revision | bool

    # ─────────────────────────────────────────────
    # WAIT FOR ROLLOUT (only if rollback was done)
    # ─────────────────────────────────────────────

    - name: Wait for deployment rollout to complete
      kubernetes.core.k8s_info:
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ alert_namespace }}"
        validate_certs: false
      register: rollout_status
      until: >-
        rollout_status.resources[0].status.readyReplicas is defined and
        rollout_status.resources[0].status.readyReplicas ==
        rollout_status.resources[0].spec.replicas
      retries: 18
      delay: 10
      when: has_previous_revision | bool

    # ─────────────────────────────────────────────
    # EMAIL — PATH A (rollback succeeded)
    # ─────────────────────────────────────────────

    - name: "[Email-A] Prepare rollback email"
      set_fact:
        email_subject: "[RF-02] CrashLoopBackOff Remediated - Rollback Applied - {{ deployment_name }}"
        email_body: |
          RF-02 Autonomous Remediation Platform - Alert

          Severity    - CRITICAL
          Scenario    - S6 CrashLoopBackOff Bad Entrypoint
          Time        - {{ ansible_date_time.iso8601 }}

          Affected Service
          Deployment  - {{ deployment_name }}
          Pod         - {{ alert_pod }}
          Namespace   - {{ alert_namespace }}

          Root Cause Analysis
          The container entered CrashLoopBackOff because the entrypoint
          command could not be found by the shell (exit code 127).
          This means the command specified in the deployment spec does
          not exist inside the container image filesystem.

          Diagnostic Details
          Container        - {{ container_name }}
          Failing command  - {{ current_command }}
          Exit code        - {{ last_exit_code }} (command not found)
          Restart count    - {{ restart_count }}

          Remediation Applied
          Action           - Automatic rollback to last healthy ReplicaSet
          Restored image   - {{ previous_image }}
          Restored command - {{ previous_command if previous_command | length > 0 else 'none (default entrypoint)' }}
          Status           - Rollout complete, service is healthy.

          Required Action
          The rollback has restored service availability.
          Please investigate the deployment that introduced the bad
          command override and fix it before redeploying.

          This is an automated message from RF-02.
          Do not reply to this email.
      when: has_previous_revision | bool

    - name: "[Email-A] Write rollback email body to temp file"
      copy:
        content: "{{ email_body }}"
        dest: /tmp/rf02_email_body.txt
      no_log: true
      when: has_previous_revision | bool

    - name: "[Email-A] Write rollback send script"
      copy:
        dest: /tmp/rf02_send_email.py
        content: |
          import smtplib
          from email.mime.text import MIMEText
          body = open('/tmp/rf02_email_body.txt').read()
          msg = MIMEText(body)
          msg['Subject'] = '{{ email_subject }}'
          msg['From'] = '{{ smtp_user }}'
          msg['To'] = '{{ smtp_user }}'
          s = smtplib.SMTP('smtp.gmail.com', 587)
          s.starttls()
          s.login('{{ smtp_user }}', '{{ smtp_password }}')
          s.sendmail('{{ smtp_user }}', '{{ smtp_user }}', msg.as_string())
          s.quit()
          print('Email sent successfully')
      no_log: true
      when: has_previous_revision | bool

    - name: "[Email-A] Send rollback notification"
      command: python3 /tmp/rf02_send_email.py
      when: has_previous_revision | bool

    # ─────────────────────────────────────────────
    # EMAIL — PATH B (no healthy RS, manual action required)
    # ─────────────────────────────────────────────

    - name: "[Email-B] Prepare manual intervention email"
      set_fact:
        email_subject: "[RF-02] CrashLoopBackOff Detected - Manual Intervention Required - {{ deployment_name }}"
        email_body: |
          RF-02 Autonomous Remediation Platform - Alert

          Severity    - CRITICAL
          Scenario    - S6 CrashLoopBackOff Bad Entrypoint
          Time        - {{ ansible_date_time.iso8601 }}

          Affected Service
          Deployment  - {{ deployment_name }}
          Pod         - {{ alert_pod }}
          Namespace   - {{ alert_namespace }}

          Root Cause Analysis
          The container entered CrashLoopBackOff because the entrypoint
          command could not be found by the shell (exit code 127).
          This means the command specified in the deployment spec does
          not exist inside the container image filesystem.
          The platform could NOT perform an automatic rollback because
          no healthy running ReplicaSet exists for this deployment.

          Diagnostic Details
          Container        - {{ container_name }}
          Failing command  - {{ current_command }}
          Exit code        - {{ last_exit_code }} (command not found)
          Restart count    - {{ restart_count }}

          Recommended Actions
          1. Verify the command specified in the deployment spec exists
             inside the container image by running:
             kubectl exec -it <pod> -- which <command>
          2. Remove or correct the command override in the deployment:
             kubectl edit deployment {{ deployment_name }} -n {{ alert_namespace }}
          3. If the image itself is wrong, redeploy with the correct
             image tag that contains the expected entrypoint binary.
          4. After fixing, monitor pod status:
             kubectl get pods -n {{ alert_namespace }} -w

          Automatic remediation was NOT applied.
          Immediate manual intervention is required to restore service.

          This is an automated message from RF-02.
          Do not reply to this email.
      when: not (has_previous_revision | bool)

    - name: "[Email-B] Write manual intervention email body to temp file"
      copy:
        content: "{{ email_body }}"
        dest: /tmp/rf02_email_body.txt
      no_log: true
      when: not (has_previous_revision | bool)

    - name: "[Email-B] Write manual intervention send script"
      copy:
        dest: /tmp/rf02_send_email.py
        content: |
          import smtplib
          from email.mime.text import MIMEText
          body = open('/tmp/rf02_email_body.txt').read()
          msg = MIMEText(body)
          msg['Subject'] = '{{ email_subject }}'
          msg['From'] = '{{ smtp_user }}'
          msg['To'] = '{{ smtp_user }}'
          s = smtplib.SMTP('smtp.gmail.com', 587)
          s.starttls()
          s.login('{{ smtp_user }}', '{{ smtp_password }}')
          s.sendmail('{{ smtp_user }}', '{{ smtp_user }}', msg.as_string())
          s.quit()
          print('Email sent successfully')
      no_log: true
      when: not (has_previous_revision | bool)

    - name: "[Email-B] Send manual intervention notification"
      command: python3 /tmp/rf02_send_email.py
      when: not (has_previous_revision | bool)

    # ─────────────────────────────────────────────
    # FINAL REPORT
    # ─────────────────────────────────────────────

    - name: Report remediation complete
      debug:
        msg: >
          S6 complete — deployment={{ deployment_name }}
          | rollback={{ has_previous_revision }}
          | exit_code={{ last_exit_code }}
          | restarts={{ restart_count }}
          | command={{ current_command }}
          | email sent to {{ smtp_user }}
