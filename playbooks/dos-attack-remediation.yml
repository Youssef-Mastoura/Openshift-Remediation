---
- name: S8 - DoS Attack Remediation
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:

    # ─────────────────────────────────────────────
    # EXTRACT ALERT INFO
    # The alert fires from openshift-ingress namespace
    # but all remediation targets ms-demo namespace.
    # ─────────────────────────────────────────────

    - name: Extract alert info from event
      set_fact:
        alert_route: "{{ event.payload.alerts[0].labels.route }}"
        app_namespace: "ms-demo"

    - name: Log remediation start
      debug:
        msg: "DoS attack alert fired — route={{ alert_route }}"

    # ─────────────────────────────────────────────
    # FIND ROUTE IN ms-demo AND DERIVE SERVICE NAME
    # Read spec.to.name from route to get backend
    # service name dynamically — no hardcoding.
    # ─────────────────────────────────────────────

    - name: Get route from ms-demo namespace
      kubernetes.core.k8s_info:
        kind: Route
        name: "{{ alert_route }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: route_info

    - name: Fail if route not found in ms-demo
      fail:
        msg: "Route {{ alert_route }} not found in namespace {{ app_namespace }}"
      when: route_info.resources | length == 0

    - name: Extract deployment name from route backend service
      set_fact:
        deployment_name: "{{ route_info.resources[0].spec.to.name }}"

    - name: Log derived deployment name
      debug:
        msg: "Route={{ alert_route }} → backend service/deployment={{ deployment_name }}"

    # ─────────────────────────────────────────────
    # ACTION 1 — RATE LIMIT THE ROUTE
    # ─────────────────────────────────────────────

    - name: "[RateLimit] Apply rate limiting annotation on targeted route"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: "{{ alert_route }}"
            namespace: "{{ app_namespace }}"
            annotations:
              haproxy.router.openshift.io/rate-limit-connections: "true"
              haproxy.router.openshift.io/rate-limit-connections.rate-http: "20"
              remediation/dos-rate-limit-applied-at: "{{ ansible_date_time.iso8601 }}"

    - name: "[RateLimit] Log rate limit applied"
      debug:
        msg: "Rate limiting applied on route {{ alert_route }} — max 20 HTTP req/s per client"

    # ─────────────────────────────────────────────
    # ACTION 2 — APPLY NETWORK POLICY
    # ─────────────────────────────────────────────

    - name: "[NetworkPolicy] Apply protective ingress policy on targeted deployment"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: "dos-mitigation-{{ deployment_name }}"
            namespace: "{{ app_namespace }}"
            annotations:
              remediation/dos-networkpolicy-applied-at: "{{ ansible_date_time.iso8601 }}"
          spec:
            podSelector:
              matchLabels:
                app: "{{ deployment_name }}"
            policyTypes:
              - Ingress
            ingress:
              - from:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: openshift-ingress
              - from:
                  - podSelector: {}
              - from:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: openshift-monitoring

    - name: "[NetworkPolicy] Log network policy applied"
      debug:
        msg: "NetworkPolicy dos-mitigation-{{ deployment_name }} applied in {{ app_namespace }}"

    # ─────────────────────────────────────────────
    # ACTION 3 — SCALE UP DEPLOYMENT
    # ─────────────────────────────────────────────

    - name: "[Scale] Get current deployment info"
      kubernetes.core.k8s_info:
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: deployment_info

    - name: "[Scale] Extract current replica count"
      set_fact:
        current_replicas: "{{ deployment_info.resources[0].spec.replicas | int }}"

    - name: "[Scale] Calculate new replica count (current × 1.5)"
      set_fact:
        new_replicas: "{{ (current_replicas | int * 1.5) | round(0, 'ceil') | int }}"

    - name: "[Scale] Log replica change"
      debug:
        msg: "Scaling {{ deployment_name }}: {{ current_replicas }} → {{ new_replicas }} replicas"

    - name: "[Scale] Scale up targeted deployment"
      kubernetes.core.k8s_scale:
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        replicas: "{{ new_replicas }}"
        validate_certs: false

    - name: Wait for scaled deployment to become ready
      kubernetes.core.k8s_info:
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: scale_status
      until: >-
        scale_status.resources[0].status.readyReplicas is defined and
        scale_status.resources[0].status.readyReplicas | int >= new_replicas | int
      retries: 12
      delay: 10

    # ─────────────────────────────────────────────
    # ACTION 4 — EMAIL NOTIFICATION
    # ─────────────────────────────────────────────

    - name: "[Email] Prepare email body"
      set_fact:
        email_subject: "[RF-02] DoS Attack Detected and Mitigated - {{ alert_route }}"
        email_body: |
          RF-02 Autonomous Remediation Platform - Security Alert

          Severity    - CRITICAL
          Scenario    - S8 DoS Attack Detection and Mitigation
          Time        - {{ ansible_date_time.iso8601 }}

          Attack Details
          Route           - {{ alert_route }}
          Backend Service - {{ deployment_name }}
          Namespace       - {{ app_namespace }}
          Detection       - HTTP response rate exceeded 50 req/s threshold

          Automated Actions Taken

          1. Rate Limiting Applied
             Route {{ alert_route }} limited to 20 HTTP req/s per client
             at the OpenShift ingress router level.
             Legitimate users are completely unaffected.

          2. Network Policy Applied
             NetworkPolicy dos-mitigation-{{ deployment_name }} created.
             Ingress to {{ deployment_name }} restricted to:
             - OpenShift ingress router
             - Pods within ms-demo namespace
             - OpenShift monitoring namespace

          3. Deployment Scaled Up
             {{ deployment_name }} scaled from {{ current_replicas }}
             to {{ new_replicas }} replicas.

          Manual Cleanup Required (when attack is resolved)

          Remove rate limiting:
            oc annotate route {{ alert_route }} -n {{ app_namespace }} \
              haproxy.router.openshift.io/rate-limit-connections- \
              haproxy.router.openshift.io/rate-limit-connections.rate-http-

          Remove network policy:
            oc delete networkpolicy dos-mitigation-{{ deployment_name }} \
              -n {{ app_namespace }}

          Scale back to original:
            oc scale deployment {{ deployment_name }} \
              -n {{ app_namespace }} --replicas={{ current_replicas }}

          This is an automated message from RF-02.
          Do not reply to this email.

    - name: "[Email] Write email body to temp file"
      copy:
        content: "{{ email_body }}"
        dest: /tmp/rf02_dos_email_body.txt
      no_log: true

    - name: "[Email] Write email send script"
      copy:
        dest: /tmp/rf02_dos_send_email.py
        content: |
          import smtplib
          from email.mime.text import MIMEText
          body = open('/tmp/rf02_dos_email_body.txt').read()
          msg = MIMEText(body)
          msg['Subject'] = '{{ email_subject }}'
          msg['From'] = '{{ smtp_user }}'
          msg['To'] = '{{ smtp_user }}'
          s = smtplib.SMTP('smtp.gmail.com', 587)
          s.starttls()
          s.login('{{ smtp_user }}', '{{ smtp_password }}')
          s.sendmail('{{ smtp_user }}', '{{ smtp_user }}', msg.as_string())
          s.quit()
          print('Email sent successfully')
      no_log: true

    - name: "[Email] Send DoS attack notification"
      command: python3 /tmp/rf02_dos_send_email.py

    - name: Report remediation complete
      debug:
        msg: >
          S8 DoS remediation complete
          | route={{ alert_route }}
          | deployment={{ deployment_name }}
          | rate_limit=20req/s applied
          | networkpolicy=dos-mitigation-{{ deployment_name }} applied
          | replicas={{ current_replicas }} → {{ new_replicas }}
          | email sent to {{ smtp_user }}
          | manual cleanup required by engineer
