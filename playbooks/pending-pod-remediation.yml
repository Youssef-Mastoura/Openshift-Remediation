---
- name: S7 — Pending Pod Remediation (3 causes)
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    app_namespace: ms-demo

  tasks:

    # ─────────────────────────────────────────
    # PHASE 1 — EVENT PARSING
    # ─────────────────────────────────────────

    - name: "[PHASE 1] Extract alert context from EDA event"
      set_fact:
        alert_pod: "{{ event.payload.alerts[0].labels.pod }}"
        remediation_type: "{{ event.payload.alerts[0].labels.remediation }}"
        alert_namespace: "{{ event.payload.alerts[0].labels.namespace }}"

    - name: "[PHASE 1] Derive deployment name from pod name"
      set_fact:
        deployment_name: "{{ alert_pod | regex_replace('-[a-z0-9]+-[a-z0-9]+$', '') }}"

    - name: "[PHASE 1] Log remediation start"
      debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "  RF-02 | Pending Pod Remediation Initiated"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "  Pod         : {{ alert_pod }}"
          - "  Deployment  : {{ deployment_name }}"
          - "  Cause       : {{ remediation_type }}"
          - "  Namespace   : {{ alert_namespace }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    # ─────────────────────────────────────────
    # PHASE 2 — DISCOVERY
    # ─────────────────────────────────────────

    - name: "[PHASE 2] Get Deployment info"
      kubernetes.core.k8s_info:
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: deployment_info

    - name: "[PHASE 2] Abort if deployment not found"
      fail:
        msg: "Deployment '{{ deployment_name }}' not found. Aborting."
      when: deployment_info.resources | length == 0

    # ─────────────────────────────────────────
    # PHASE 3 — CAUSE DETECTION (unschedulable only)
    # ─────────────────────────────────────────

    - name: "[PHASE 3] Get FailedScheduling events for this pod"
      kubernetes.core.k8s_info:
        kind: Event
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: all_events
      when: remediation_type == "pending-pod-unschedulable"

    - name: "[PHASE 3] Filter FailedScheduling events for this pod"
      set_fact:
        pod_events: >-
          {{ all_events.resources
             | selectattr('involvedObject.name', '==', alert_pod)
             | selectattr('reason', '==', 'FailedScheduling')
             | map(attribute='message') | list }}
      when: remediation_type == "pending-pod-unschedulable"

    - name: "[PHASE 3] Check exact affinity/selector patterns"
      set_fact:
        has_affinity_issue: true
        detected_cause: "Node Affinity/Selector Mismatch"
        cause_confidence: "High"
      when:
        - remediation_type == "pending-pod-unschedulable"
        - pod_events | length > 0
        - >
            (pod_events | select('search', 'did not match pod affinity') | list | length > 0) or
            (pod_events | select('search', 'did not match node selector') | list | length > 0) or
            (pod_events | select('search', 'did not match .* affinity') | list | length > 0) or
            (pod_events | select('search', 'no nodes available to schedule pods with selector') | list | length > 0)

    - name: "[PHASE 3] Check taint/toleration patterns"
      set_fact:
        has_affinity_issue: true
        detected_cause: "Node Taint/Toleration Mismatch"
        cause_confidence: "High"
      when:
        - remediation_type == "pending-pod-unschedulable"
        - pod_events | length > 0
        - has_affinity_issue is not defined
        - >
            (pod_events | select('search', 'did not tolerate taint') | list | length > 0) or
            (pod_events | select('search', 'taint') | list | length > 0 and
             pod_events | select('search', 'toleration') | list | length == 0)

    - name: "[PHASE 3] Get node capacity for resource verification"
      kubernetes.core.k8s_info:
        kind: Node
        validate_certs: false
      register: all_nodes
      when:
        - remediation_type == "pending-pod-unschedulable"
        - has_affinity_issue is not defined

    - name: "[PHASE 3] Extract pod resource requests"
      set_fact:
        pod_cpu_request: >-
          {{ deployment_info.resources[0].spec.template.spec.containers[0]
             .resources.requests.cpu | default('100m') | regex_replace('m', '') | int }}
        pod_mem_request: >-
          {{ deployment_info.resources[0].spec.template.spec.containers[0]
             .resources.requests.memory | default('128Mi') | regex_replace('Mi', '') | int }}
      when:
        - remediation_type == "pending-pod-unschedulable"
        - has_affinity_issue is not defined

    - name: "[PHASE 3] Calculate cluster resource pressure"
      set_fact:
        cluster_resource_pressure: >-
          {%- set ns = namespace(cpu_pressure=false, mem_pressure=false, highest_cpu=0, highest_mem=0) -%}
          {%- for node in all_nodes.resources -%}
            {%- set allocatable_cpu = node.status.allocatable.cpu | regex_replace('m', '') | int -%}
            {%- set allocatable_mem = node.status.allocatable.memory | regex_replace('Ki', '') | int -%}
            {%- if allocatable_cpu > ns.highest_cpu -%}
              {%- set ns.highest_cpu = allocatable_cpu -%}
            {%- endif -%}
            {%- if allocatable_mem > ns.highest_mem -%}
              {%- set ns.highest_mem = allocatable_mem -%}
            {%- endif -%}
            {%- if allocatable_cpu < pod_cpu_request -%}
              {%- set ns.cpu_pressure = true -%}
            {%- endif -%}
            {%- if allocatable_mem < pod_mem_request -%}
              {%- set ns.mem_pressure = true -%}
            {%- endif -%}
          {%- endfor -%}
          {{ {
            'cpu_pressure': ns.cpu_pressure,
            'mem_pressure': ns.mem_pressure,
            'largest_cpu': ns.highest_cpu,
            'largest_mem': ns.highest_mem,
            'pod_cpu': pod_cpu_request,
            'pod_mem': pod_mem_request
          } }}
      when:
        - remediation_type == "pending-pod-unschedulable"
        - has_affinity_issue is not defined

    - name: "[PHASE 3] Determine resource insufficiency cause"
      set_fact:
        has_affinity_issue: false
        detected_cause: >-
          {%- if cluster_resource_pressure.cpu_pressure and cluster_resource_pressure.mem_pressure -%}
            Insufficient CPU and Memory Resources
          {%- elif cluster_resource_pressure.cpu_pressure -%}
            Insufficient CPU Resources
          {%- elif cluster_resource_pressure.mem_pressure -%}
            Insufficient Memory Resources
          {%- else -%}
            Unknown Scheduling Constraint
          {%- endif -%}
        cause_confidence: >-
          {%- if cluster_resource_pressure.cpu_pressure or cluster_resource_pressure.mem_pressure -%}
            High
          {%- else -%}
            Low
          {%- endif -%}
      when:
        - remediation_type == "pending-pod-unschedulable"
        - has_affinity_issue is not defined
        - cluster_resource_pressure.cpu_pressure or cluster_resource_pressure.mem_pressure

    - name: "[PHASE 3] Set unknown cause with raw events for debugging"
      set_fact:
        has_affinity_issue: false
        detected_cause: "Unknown Scheduling Constraint (check raw events)"
        cause_confidence: "Low"
      when:
        - remediation_type == "pending-pod-unschedulable"
        - has_affinity_issue is not defined

    - name: "[PHASE 3] Log cause detection with confidence"
      debug:
        msg:
          - "  Events found     : {{ pod_events | length }}"
          - "  Detected cause   : {{ detected_cause | default('Unknown') }}"
          - "  Confidence       : {{ cause_confidence | default('Unknown') }}"
          - "  Is Affinity Issue: {{ has_affinity_issue | default(false) }}"
          - "  Pod requests     : CPU={{ pod_cpu_request | default('N/A') }}m, Memory={{ pod_mem_request | default('N/A') }}Mi"
          - "  Largest node     : CPU={{ cluster_resource_pressure.largest_cpu | default('N/A') }}m, Memory={{ cluster_resource_pressure.largest_mem | default('N/A') }}Mi"
      when: remediation_type == "pending-pod-unschedulable"

    - name: "[PHASE 3] Log raw events for low confidence cases"
      debug:
        msg:
          - "  Raw events for debugging:"
          - "    {{ pod_events[0:3] | to_nice_json }}"
      when:
        - remediation_type == "pending-pod-unschedulable"
        - cause_confidence | default('High') == "Low"

    # ─────────────────────────────────────────
    # PHASE 4 — REMEDIATION
    # ─────────────────────────────────────────

    # --- CAUSE 2: Node Affinity/Selector Mismatch ---
    - name: "[PHASE 4 — Affinity] Remove nodeSelector and affinity"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ deployment_name }}"
            namespace: "{{ app_namespace }}"
            annotations:
              remediation/action: "affinity-removed"
              remediation/triggered-by: "RF-02-PREFAS"
              remediation/timestamp: "{{ ansible_date_time.iso8601 }}"
          spec:
            template:
              spec:
                nodeSelector: null
                affinity: null
      when:
        - remediation_type == "pending-pod-unschedulable"
        - has_affinity_issue | default(false) | bool

    - name: "[PHASE 4 — Affinity] Log fix applied"
      debug:
        msg: "Removed nodeSelector/affinity from {{ deployment_name }} — pod should schedule now"
      when:
        - remediation_type == "pending-pod-unschedulable"
        - has_affinity_issue | default(false) | bool

    # --- CAUSE 1: Insufficient Resources ---
    - name: "[PHASE 4 — Resources] Extract container name and current requests"
      set_fact:
        container_name: >-
          {{ deployment_info.resources[0].spec.template.spec.containers[0].name }}
        current_cpu_request: >-
          {{ deployment_info.resources[0].spec.template.spec.containers[0]
             .resources.requests.cpu | default('100m') }}
        current_mem_request: >-
          {{ deployment_info.resources[0].spec.template.spec.containers[0]
             .resources.requests.memory | default('128Mi') }}
      when:
        - remediation_type == "pending-pod-unschedulable"
        - not (has_affinity_issue | default(false) | bool)

    - name: "[PHASE 4 — Resources] Convert CPU request to millicores"
      set_fact:
        cpu_millicores: "{{ current_cpu_request | regex_replace('m', '') | int }}"
      when:
        - remediation_type == "pending-pod-unschedulable"
        - not (has_affinity_issue | default(false) | bool)

    - name: "[PHASE 4 — Resources] Convert memory request to Mi"
      set_fact:
        mem_mi: "{{ current_mem_request | regex_replace('Mi', '') | int }}"
      when:
        - remediation_type == "pending-pod-unschedulable"
        - not (has_affinity_issue | default(false) | bool)

    - name: "[PHASE 4 — Resources] Compute reduced requests (x0.75)"
      set_fact:
        new_cpu_request: "{{ (cpu_millicores | int * 0.75) | int }}m"
        new_mem_request: "{{ (mem_mi | int * 0.75) | int }}Mi"
      when:
        - remediation_type == "pending-pod-unschedulable"
        - not (has_affinity_issue | default(false) | bool)

    - name: "[PHASE 4 — Resources] Log resource reduction plan"
      debug:
        msg:
          - "  CPU  : {{ current_cpu_request }} → {{ new_cpu_request }}"
          - "  Memory: {{ current_mem_request }} → {{ new_mem_request }}"
      when:
        - remediation_type == "pending-pod-unschedulable"
        - not (has_affinity_issue | default(false) | bool)

    - name: "[PHASE 4 — Resources] Patch deployment with reduced resource requests"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ deployment_name }}"
            namespace: "{{ app_namespace }}"
            annotations:
              remediation/action: "resource-requests-reduced"
              remediation/triggered-by: "RF-02-PREFAS"
              remediation/timestamp: "{{ ansible_date_time.iso8601 }}"
              remediation/previous-cpu-request: "{{ current_cpu_request }}"
              remediation/new-cpu-request: "{{ new_cpu_request }}"
              remediation/previous-mem-request: "{{ current_mem_request }}"
              remediation/new-mem-request: "{{ new_mem_request }}"
          spec:
            template:
              spec:
                containers:
                  - name: "{{ container_name }}"
                    resources:
                      requests:
                        cpu: "{{ new_cpu_request }}"
                        memory: "{{ new_mem_request }}"
      when:
        - remediation_type == "pending-pod-unschedulable"
        - not (has_affinity_issue | default(false) | bool)

    # --- CAUSE 3: PVC Not Bound ---
    - name: "[PHASE 4 — PVC] Find all PVCs in namespace"
      kubernetes.core.k8s_info:
        kind: PersistentVolumeClaim
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: all_pvcs
      when: remediation_type == "pending-pod-pvc"

    - name: "[PHASE 4 — PVC] Filter pending PVCs"
      set_fact:
        pending_pvcs: >-
          {{ all_pvcs.resources
             | selectattr('status.phase', '==', 'Pending') | list }}
      when: remediation_type == "pending-pod-pvc"

    - name: "[PHASE 4 — PVC] Log pending PVCs found"
      debug:
        msg: "Found {{ pending_pvcs | length }} pending PVC(s): {{ pending_pvcs | map(attribute='metadata.name') | list }}"
      when: remediation_type == "pending-pod-pvc"

    - name: "[PHASE 4 — PVC] Fail gracefully if no pending PVCs found"
      fail:
        msg: "No pending PVCs found in namespace {{ app_namespace }}. Cannot remediate."
      when:
        - remediation_type == "pending-pod-pvc"
        - pending_pvcs | length == 0

    - name: "[PHASE 4 — PVC] Create matching hostPath PV for each pending PVC"
      kubernetes.core.k8s:
        state: present
        validate_certs: false
        definition:
          apiVersion: v1
          kind: PersistentVolume
          metadata:
            name: "remediation-pv-{{ item.metadata.name }}"
            annotations:
              remediation/created-at: "{{ ansible_date_time.iso8601 }}"
              remediation/triggered-by: "RF-02-PREFAS"
              remediation/for-pvc: "{{ item.metadata.name }}"
          spec:
            capacity:
              storage: "{{ item.spec.resources.requests.storage }}"
            accessModes: "{{ item.spec.accessModes }}"
            persistentVolumeReclaimPolicy: Delete
            storageClassName: "{{ item.spec.storageClassName }}"
            hostPath:
              path: "/tmp/remediation-{{ item.metadata.name }}"
              type: DirectoryOrCreate
      loop: "{{ pending_pvcs }}"
      when:
        - remediation_type == "pending-pod-pvc"
        - pending_pvcs | length > 0

    - name: "[PHASE 4 — PVC] Wait for PVC to bind"
      kubernetes.core.k8s_info:
        kind: PersistentVolumeClaim
        name: "{{ item.metadata.name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: pvc_status
      until: pvc_status.resources[0].status.phase == "Bound"
      retries: 12
      delay: 10
      loop: "{{ pending_pvcs }}"
      when:
        - remediation_type == "pending-pod-pvc"
        - pending_pvcs | length > 0

    - name: "[PHASE 4 — PVC] Log PVC bound successfully"
      debug:
        msg: "PVC {{ item.metadata.name }} → Bound to PV remediation-pv-{{ item.metadata.name }}"
      loop: "{{ pending_pvcs }}"
      when:
        - remediation_type == "pending-pod-pvc"
        - pending_pvcs | length > 0

    # ─────────────────────────────────────────
    # PHASE 5 — VERIFICATION
    # ─────────────────────────────────────────

    - name: "[PHASE 5] Wait for deployment rollout to complete"
      kubernetes.core.k8s_info:
        kind: Deployment
        name: "{{ deployment_name }}"
        namespace: "{{ app_namespace }}"
        validate_certs: false
      register: rollout_status
      until: >-
        rollout_status.resources[0].status.readyReplicas is defined and
        rollout_status.resources[0].status.readyReplicas ==
        rollout_status.resources[0].spec.replicas
      retries: 12
      delay: 10

    - name: "[PHASE 5] Log rollout status"
      debug:
        msg: "Rollout complete for {{ deployment_name }} — readyReplicas={{ rollout_status.resources[0].status.readyReplicas }}"

    # ─────────────────────────────────────────
    # PHASE 6 — NOTIFICATION
    # ─────────────────────────────────────────

    - name: "[PHASE 6] Write email body to temp file"
      copy:
        dest: /tmp/pending_email_body.txt
        content: |
          RF-02 Autonomous Remediation Platform — Alert

          Severity    : CRITICAL
          Scenario    : S7 — Pending Pod Detection & Remediation
          Time        : {{ ansible_date_time.iso8601 }}

          AFFECTED SERVICE
          ─────────────────────────────────────────────────────
          Namespace   : {{ app_namespace }}
          Pod         : {{ alert_pod }}
          Deployment  : {{ deployment_name }}
          Cause Type  : {{ remediation_type }}

          REMEDIATION APPLIED
          ─────────────────────────────────────────────────────
          {% if remediation_type == "pending-pod-pvc" %}
          Action      : Created hostPath PV to bind pending PVC
          PVCs Fixed  : {{ pending_pvcs | map(attribute='metadata.name') | list | join(', ') }}
          {% elif has_affinity_issue | default(false) | bool %}
          Action      : Removed nodeSelector and affinity constraints
          Reason      : No node matched the scheduling requirements
          {% else %}
          Action      : Reduced resource requests by 25% (x0.75)
          CPU         : {{ current_cpu_request }} → {{ new_cpu_request }}
          Memory      : {{ current_mem_request }} → {{ new_mem_request }}
          Reason      : Insufficient node resources to schedule pod
          {% endif %}

          OUTCOME
          ─────────────────────────────────────────────────────
          ✅ Deployment rollout completed successfully.
          Pod is now Running and Ready.

          ──────────────────────────────────────────────────────
          This action was performed automatically by RF-02.
          No manual intervention was required.
          ──────────────────────────────────────────────────────
      no_log: true

    - name: "[PHASE 6] Write email send script"
      copy:
        dest: /tmp/pending_send_email.py
        content: |
          import smtplib
          from email.mime.text import MIMEText
          body = open('/tmp/pending_email_body.txt').read()
          msg = MIMEText(body)
          msg['Subject'] = '[RF-02] Pending Pod Remediated — {{ deployment_name }} ({{ remediation_type }})'
          msg['From'] = '{{ smtp_user }}'
          msg['To'] = '{{ smtp_user }}'
          s = smtplib.SMTP('smtp.gmail.com', 587)
          s.starttls()
          s.login('{{ smtp_user }}', '{{ smtp_password }}')
          s.sendmail('{{ smtp_user }}', '{{ smtp_user }}', msg.as_string())
          s.quit()
          print('Email sent successfully')
      no_log: true

    - name: "[PHASE 6] Send remediation email"
      command: python3 /tmp/pending_send_email.py

    - name: "[PHASE 6] Final summary log"
      debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "  ✅ Remediation COMPLETE"
          - "  Deployment  : {{ deployment_name }}"
          - "  Cause       : {{ remediation_type }}"
          - "  Email       : sent to {{ smtp_user }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
